<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>OUI-Spy C6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--card:#18181b;--card2:#1f1f23;--border:#3f3f46;
  --text:#fafafa;--dim:#a1a1aa;--accent:#fbbf24;
  --rose:#f87171;--green:#4ade80;--amber:#fbbf24;--sky:#14ff00;
  --cyan:#22d3ee;--flock:#f87171;--fox:#fb923c;--skyblue:#14ff00;--blue:#14ff00;
  --mode-accent:var(--accent);--mode-accent-rgb:251,191,36;
}
body{background:radial-gradient(1000px 420px at 12% -10%,rgba(248,113,113,.14),transparent 60%),
  radial-gradient(800px 380px at 88% -20%,rgba(251,146,60,.12),transparent 55%),var(--bg);
  color:var(--text);font-family:'Segoe UI','Aptos',Tahoma,sans-serif;
  font-size:14px;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{color:#a5b4fc}

/* Header */
.hdr{border-bottom:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  transition:background .4s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.hdr.mode-flock{background:rgba(248,113,113,.10)}
.hdr.mode-fox{background:rgba(251,146,60,.14)}
.hdr.mode-sky{background:rgba(20,255,0,.10)}
.hdr.mode-settings{background:rgba(251,191,36,.08)}
.hdr.mode-select{background:linear-gradient(90deg,rgba(251,191,36,.12),rgba(251,146,60,.10))}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:.5px}
.hdr h1 span{color:var(--accent)}
.hdr h1.logo-btn{cursor:pointer;user-select:none}
.hdr h1.logo-btn:hover{filter:brightness(1.08)}
.hdr .status{display:flex;gap:10px;font-size:11px;color:var(--dim)}
.hdr .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.on{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.5)}
.dot.off{background:var(--rose);opacity:.7}

/* Mode tabs */
.tabs{display:flex;gap:4px;padding:8px 12px;background:rgba(9,18,34,.95);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px 6px;text-align:center;border-radius:10px;cursor:pointer;
  font-weight:600;font-size:11px;transition:all .2s;border:1px solid transparent;
  text-transform:uppercase;letter-spacing:.8px;color:var(--dim)}
.tab:hover{background:var(--card);color:var(--text)}
.tab.active{border-color:var(--mode-accent);background:rgba(var(--mode-accent-rgb),.12);color:var(--mode-accent)}
.tab.t-flock.active{border-color:var(--flock);color:var(--flock);background:rgba(248,113,113,.08)}
.tab.t-fox.active{border-color:var(--fox);color:var(--fox);background:rgba(251,146,60,.08)}
.tab.t-sky.active{border-color:var(--skyblue);color:var(--skyblue);background:rgba(20,255,0,.08)}

/* Content area */
.content{padding:12px;transition:background .4s,opacity .18s ease,transform .18s ease}
.content.switching{opacity:.58;transform:translateY(4px);pointer-events:none}
.content.mode-flock{background:linear-gradient(180deg,rgba(248,113,113,.07),transparent 50%)}
.content.mode-fox{background:linear-gradient(180deg,rgba(251,146,60,.08),transparent 55%)}
.content.mode-sky{background:linear-gradient(180deg,rgba(20,255,0,.08),transparent 50%)}
.content.mode-settings{background:linear-gradient(180deg,rgba(251,191,36,.05),transparent 50%)}
.content.mode-select{background:linear-gradient(180deg,rgba(251,191,36,.08),rgba(251,146,60,.05) 50%,transparent 100%)}
.mode-flock{--mode-accent:var(--flock);--mode-accent-rgb:248,113,113}
.mode-fox{--mode-accent:var(--fox);--mode-accent-rgb:251,146,60}
.mode-sky{--mode-accent:var(--skyblue);--mode-accent-rgb:20,255,0}
.mode-settings,.mode-select{--mode-accent:var(--accent);--mode-accent-rgb:251,191,36}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03),0 8px 22px rgba(0,0,0,.20)}
.card h2{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin-bottom:12px;font-weight:600}

/* Stats row */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.stat{text-align:center;padding:12px 6px;background:var(--card2);border-radius:10px;border:1px solid var(--border)}
.stat .val{font-size:24px;font-weight:700;line-height:1.2}
.stat .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.stat.highlight .val{color:var(--accent)}
.stat.gps.on .val{color:var(--green)}
.stat.gps.off .val{color:var(--rose)}

/* Mode-specific card accents */
.mode-flock .card{border-left:3px solid var(--flock)}
.mode-flock .stat.highlight .val{color:var(--flock)}
.mode-flock .card h2{color:var(--flock)}
.mode-fox .card{border-left:3px solid var(--fox)}
.mode-fox .stat.highlight .val{color:var(--fox)}
.mode-fox .card h2{color:var(--fox)}
.mode-sky .card{border-left:3px solid var(--skyblue)}
.mode-sky .stat.highlight .val{color:var(--skyblue)}
.mode-sky .card h2{color:var(--skyblue)}
.mode-settings .card{border-left:3px solid var(--accent)}
.mode-settings .card h2{color:var(--accent)}
.mode-select .card{border-left:3px solid var(--amber)}
.mode-select .stat.highlight .val{color:var(--amber)}
.mode-select .card h2{color:var(--amber)}

/* Device list */
.dev-list{max-height:50vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.dev-item{display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;border-radius:6px;margin:2px 0}
.dev-item:hover{background:rgba(var(--mode-accent-rgb),.1)}
.dev-item:last-child{border-bottom:none}
.dev-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0}
.dev-icon.flock{background:rgba(248,113,113,.12);color:var(--flock)}
.dev-icon.raven{background:rgba(251,146,60,.12);color:var(--fox)}
.dev-icon.drone{background:rgba(56,189,248,.12);color:var(--skyblue)}
.dev-icon.dji{background:rgba(251,146,60,.12);color:var(--fox)}
.dev-info{flex:1;min-width:0}
.dev-mac{font-family:'SF Mono','Consolas','Courier New',monospace;font-size:12px;font-weight:600}
.dev-name{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-rssi{text-align:right;font-weight:700;font-size:13px}
.dev-rssi.strong{color:var(--green)}.dev-rssi.medium{color:var(--amber)}.dev-rssi.weak{color:var(--rose)}
.dev-actions{display:flex;gap:4px}

/* Buttons */
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:var(--card);
  color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;
  text-transform:uppercase;letter-spacing:.5px}
.btn:hover{border-color:var(--mode-accent);background:rgba(var(--mode-accent-rgb),.16)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--mode-accent);border-color:var(--mode-accent);color:#111}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{border-color:var(--rose);color:var(--rose)}
.btn.danger:hover{background:rgba(240,113,139,.1)}
.btn.sm{padding:5px 10px;font-size:11px}
.btn[disabled]{opacity:.45;cursor:not-allowed;filter:saturate(.6)}
.btn[disabled]:hover{border-color:var(--border);background:var(--card)}

/* Proximity bar */
.prox-wrap{position:relative;height:28px;background:var(--card2);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.prox-bar{height:100%;transition:width .3s,background .3s;border-radius:10px}
.prox-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,.6)}

/* Fox hunter proximity */
.fox-target{text-align:center;padding:20px 0}
.fox-target .mac{font-family:monospace;font-size:18px;font-weight:700;color:var(--fox);margin:8px 0;letter-spacing:.5px}
.fox-target .rssi-big{font-size:48px;font-weight:800;line-height:1}
.fox-target .unit{font-size:14px;color:var(--dim)}
.fox-target .best{font-size:12px;color:var(--dim);margin-top:4px}
.fox-signal{display:flex;gap:3px;justify-content:center;align-items:flex-end;height:40px;margin:12px 0}
.fox-signal .bar{width:6px;border-radius:3px;transition:height .3s,background .3s}

/* Drone cards */
.drone-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.drone-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.drone-proto{font-size:10px;padding:3px 10px;border-radius:6px;font-weight:700;text-transform:uppercase}
.drone-proto.wifi{background:rgba(56,189,248,.12);color:var(--skyblue)}
.drone-proto.ble{background:rgba(34,211,238,.12);color:var(--cyan)}
.drone-proto.dji{background:rgba(251,146,60,.12);color:var(--fox)}
.drone-fields{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px}
.drone-fields dt{color:var(--dim)}.drone-fields dd{font-weight:600}

/* Radar animation */
.radar{width:120px;height:120px;margin:20px auto;position:relative}
.radar-bg{width:100%;height:100%;border-radius:50%;border:1px solid var(--border);
  background:radial-gradient(circle,rgba(56,189,248,.06),transparent)}
.radar-sweep{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(56,189,248,.18) 30deg,transparent 60deg);
  animation:sweep 3s linear infinite}
.radar-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--flock);
  box-shadow:0 0 8px rgba(248,113,113,.6);top:50%;left:50%;transform:translate(-50%,-50%)}
@keyframes sweep{to{transform:rotate(360deg)}}

/* Settings panel */
.settings{display:grid;gap:10px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:13px}
.toggle{position:relative;width:42px;height:24px;cursor:pointer}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:#3f3f46;border-radius:12px;transition:background .2s}
.toggle .slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.slider{background:var(--mode-accent)}
.toggle input:checked+.slider:before{transform:translateX(18px)}
input[type=range]{width:100%;accent-color:var(--mode-accent)}
.input-mac{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;
  color:var(--text);font-family:monospace;font-size:14px;width:100%;outline:none;transition:border-color .2s}
.input-mac:focus{border-color:var(--mode-accent);box-shadow:0 0 0 3px rgba(var(--mode-accent-rgb),.15)}
.input-sm,.txt-sm,.sel-sm{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px}
.input-sm,.sel-sm{padding:7px 9px}
.txt-sm{padding:8px 9px;min-height:56px;resize:vertical;font-family:inherit}
.input-sm:focus,.txt-sm:focus,.sel-sm:focus{outline:none;border-color:var(--mode-accent);box-shadow:0 0 0 3px rgba(var(--mode-accent-rgb),.15)}
.discovering-line{margin:6px 0 10px;font-size:11px;color:var(--dim);font-style:italic}

/* Fox hunter source section headers */
.src-hdr{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.src-hdr .src-count{font-weight:400;font-size:10px;color:var(--dim)}
/* Profile cards within source sections */
.prof-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:11px 12px;margin-bottom:8px}
.prof-card:last-child{margin-bottom:0}
.prof-hdr{display:flex;align-items:center;gap:10px;margin-bottom:0}
.prof-info{flex:1;min-width:0}

/* Fox Hunter readability and spacing */
.mode-fox .card{margin-bottom:14px;padding:18px}
.mode-fox .stats{gap:10px}
.mode-fox .fox-target{padding:24px 4px}
.mode-fox .src-hdr{margin-bottom:12px}
.mode-fox .prof-card{padding:13px 14px;margin-bottom:10px}
.mode-fox .dev-item{padding:12px 10px;margin:6px 0}
.fox-section-list{max-height:40vh;overflow-y:auto;padding-right:2px}

/* Unified blue + contact-list presentation for Fox Hunter sources */
.fox-source-group{border-left:3px solid var(--mode-accent)}
.fox-group-kicker{font-size:10px;letter-spacing:1.3px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.fox-contact-list{display:flex;flex-direction:column;gap:8px;max-height:40vh;overflow-y:auto;padding-right:2px}
.fox-contact{display:flex;gap:10px;align-items:flex-start;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:11px 12px}
.fox-contact:hover{background:rgba(var(--mode-accent-rgb),.10)}
.fox-contact-avatar{width:34px;height:34px;border-radius:10px;background:rgba(78,163,255,.16);border:1px solid rgba(94,199,255,.35);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--skyblue);flex-shrink:0}
.fox-contact-main{flex:1;min-width:0}
.fox-contact-name{font-size:12px;font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fox-contact-sub{font-size:11px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fox-contact-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.fox-chip{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--border);background:rgba(78,163,255,.08);color:var(--text)}
.fox-chip.near{border-color:rgba(66,211,146,.5);color:var(--green)}
.fox-chip.follow{border-color:rgba(247,194,77,.55);color:var(--amber)}
.fox-chip.detected{border-color:rgba(155,176,209,.45);color:var(--dim)}
.fox-contact-actions{display:flex;gap:4px;flex-shrink:0}

.fox-smart-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:900px){
  .fox-smart-grid{grid-template-columns:1fr 1fr}
}

/* Footer */
.ftr{text-align:center;padding:16px;font-size:11px;color:var(--dim);border-top:1px solid var(--border)}

/* Toast notifications */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);
  color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;
  box-shadow:0 4px 24px rgba(0,0,0,.4);border:1px solid var(--accent);z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* No data state */
.empty{text-align:center;padding:30px 20px;color:var(--dim)}
.empty .icon{font-size:36px;margin-bottom:8px;opacity:.7}

/* WiFi info bar */
.wifi-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;margin:0 12px 8px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);font-size:11px;color:var(--dim)}
.wifi-bar .wifi-icon{font-size:15px;flex-shrink:0}
.wifi-bar .wifi-detail{display:flex;flex-wrap:wrap;gap:4px 14px;flex:1}
.wifi-bar .wifi-lbl{font-weight:700;color:var(--text);letter-spacing:.3px}
.wifi-bar code{font-family:'SF Mono','Consolas','Courier New',monospace;color:var(--mode-accent);font-size:11px}

/* Flock GPS tagging */
.gps-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;
  margin-bottom:10px;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card2)}
.gps-status{font-size:11px;color:var(--dim);line-height:1.4}
.gps-status strong{color:var(--text)}
.gps-chip{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--border);background:rgba(34,211,238,.08);color:var(--cyan)}
.gps-chip.bad{border-color:rgba(248,113,113,.6);color:var(--rose);background:rgba(248,113,113,.08)}
.dev-loc{font-size:10px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-loc a{color:var(--cyan)}

/* Animations */
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{animation:fadein .3s ease}

/* Mobile optimizations */
@media(max-width:400px){
  .stats{grid-template-columns:1fr 1fr}
  .stat .val{font-size:20px}
  .tab{font-size:10px;padding:8px 4px}
  .mode-fox .card{padding:14px}
}

@media(min-width:900px){
  .mode-fox .content-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;align-items:start}
  .mode-fox .content-grid .full-row{grid-column:1 / -1}
}
</style>
</head>
<body>

<div class="hdr">
  <h1 class="logo-btn" onclick="goMainMenu()">OUI<span>-SPY</span> <small style="font-size:11px;color:var(--dim)">C6</small></h1>
  <div class="status">
    <span><span class="dot on" id="wsDot"></span>WS</span>
    <span id="heapInfo">--</span>
    <span id="uptimeInfo">--</span>
  </div>
</div>

<div class="tabs">
  <div class="tab t-flock" data-mode="1" onclick="setMode(1)">Flock You</div>
  <div class="tab t-fox" data-mode="2" onclick="setMode(2)">Fox Hunter</div>
  <div class="tab t-sky" data-mode="3" onclick="setMode(3)">Sky Spy</div>
  <div class="tab" data-mode="4" onclick="setMode(4)">&#9881;</div>
</div>

<div id="wifiBar"></div>
<div class="content" id="main">
  <!-- Dynamic content injected by JS -->
</div>

<div class="ftr">OUI-Spy C6 &mdash; Open Source RF Intelligence &mdash; <a href="https://github.com/colonelpanichacks/ouispy-c6">GitHub</a></div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let ws, state = {}, devices = [], drones = [];
let wsRetryMs = 1500;
let currentView = -1; // track which view is shown
let modeRenderSeq = 0;
let uiFramePending = false;
let pageSwitchPending = false;
let modeSwitchInFlight = false;
let foxLedToggleInFlight = false;
let foxLedOptimistic = null;
let gpsClientReady = false;
let gpsReadyLastPushMs = 0;
let gpsReadyLastSent = null;
let gpsReadyPushInFlight = false;
const CAM_LOC_STORE_KEY = 'ouispy_cam_locs_v1';
const GPS_TOGGLE_STORE_KEY = 'ouispy_gps_toggle_v1';
let cameraLocations = loadCameraLocations();
let gpsToggleEnabled = loadGpsToggleEnabled();

function setMainSwitching(active) {
  const main = $('#main');
  if (main) main.classList.toggle('switching', !!active);
}

function scheduleUIUpdate(withPageTransition) {
  if (withPageTransition) {
    pageSwitchPending = true;
    setMainSwitching(true);
  }
  if (uiFramePending) return;
  uiFramePending = true;
  requestAnimationFrame(() => {
    uiFramePending = false;
    updateUI();
    if (pageSwitchPending) {
      setTimeout(() => {
        setMainSwitching(false);
        pageSwitchPending = false;
      }, 140);
    }
  });
}

function applyIncomingState(nextState) {
  state = nextState || {};
  if (typeof state.gpsTagging === 'boolean') {
    gpsToggleEnabled = !!state.gpsTagging;
  }
  if (typeof state.gpsClientReady === 'boolean') {
    gpsClientReady = !!state.gpsClientReady;
  }
  if (foxLedOptimistic !== null) {
    const serverLed = !!((state.fox || {}).ledMode);
    if (serverLed === !!foxLedOptimistic) {
      foxLedOptimistic = null;
    } else {
      state.fox = Object.assign({}, state.fox || {}, { ledMode: !!foxLedOptimistic });
    }
  }
  scheduleUIUpdate(false);
}

function loadCameraLocations() {
  try {
    const raw = localStorage.getItem(CAM_LOC_STORE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return (obj && typeof obj === 'object') ? obj : {};
  } catch (e) {
    return {};
  }
}

function saveCameraLocations() {
  try { localStorage.setItem(CAM_LOC_STORE_KEY, JSON.stringify(cameraLocations)); } catch (e) {}
}

function loadGpsToggleEnabled() {
  try {
    return localStorage.getItem(GPS_TOGGLE_STORE_KEY) === 'on';
  } catch (e) {
    return false;
  }
}

function saveGpsToggleEnabled() {
  try { localStorage.setItem(GPS_TOGGLE_STORE_KEY, gpsToggleEnabled ? 'on' : 'off'); } catch (e) {}
}

function isIphoneFamily() {
  const ua = navigator.userAgent || '';
  return /iPhone|iPad|iPod/i.test(ua);
}

function gpsCaps() {
  const secureHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  return {
    supported: !!navigator.geolocation,
    secure: !!window.isSecureContext || secureHost,
    iphone: isIphoneFamily()
  };
}

function gpsSecureAvailable(caps) {
  const c = caps || gpsCaps();
  return c.supported && c.secure;
}


async function computeGpsClientReady() {
  const caps = gpsCaps();
  if (!gpsToggleEnabled || !caps.supported || !caps.secure) return false;
  if (!ws || ws.readyState !== 1) return false;

  if (navigator.permissions && navigator.permissions.query) {
    try {
      const perm = await navigator.permissions.query({name:'geolocation'});
      if (perm.state === 'denied') return false;
      if (perm.state === 'granted') return true;
      return false;
    } catch (e) {
      return true;
    }
  }

  return true;
}

async function pushGpsClientStatus(force) {
  const ready = await computeGpsClientReady();
  gpsClientReady = ready;

  const now = Date.now();
  const changed = (gpsReadyLastSent !== ready);
  const stale = (now - gpsReadyLastPushMs) > 4000;
  if (!force && !changed && !stale) return;
  if (gpsReadyPushInFlight) return;

  gpsReadyPushInFlight = true;
  await api('/api/gps/status', {ready: !!ready});
  gpsReadyPushInFlight = false;
  gpsReadyLastSent = ready;
  gpsReadyLastPushMs = now;
}
function gpsEffectiveEnabled() {
  return gpsToggleEnabled && gpsSecureAvailable();
}

function setGpsToggle(enabled) {
  const caps = gpsCaps();
  if (enabled && !gpsSecureAvailable(caps)) {
    gpsToggleEnabled = false;
    saveGpsToggleEnabled();
    state.gpsTagging = false;
    api('/api/settings', {gpsTagging:false});
    pushGpsClientStatus(true);
    if (!caps.supported) toast('GPS unavailable in this browser');
    else if (caps.iphone && !caps.secure) toast('iPhone GPS requires HTTPS');
    else toast('GPS requires HTTPS');
    renderGpsStatus();
    renderGpsToggleBlock();
    if (Number(state.mode) === 1) renderDevList();
    return;
  }
  gpsToggleEnabled = !!enabled;
  saveGpsToggleEnabled();
  state.gpsTagging = gpsToggleEnabled;
  api('/api/settings', {gpsTagging:gpsToggleEnabled});
  pushGpsClientStatus(true);
  renderGpsStatus();
  renderGpsToggleBlock();
  if (Number(state.mode) === 1) renderDevList();
}

function toggleGpsFeature() {
  setGpsToggle(!gpsToggleEnabled);
}

function renderGpsToggleBlock() {
  const block = $('#fGpsBlock');
  const stateEl = $('#fGpsState');
  const labelEl = $('#fGpsLabel');
  const btn = $('#fGpsToggleBtn');
  const caps = gpsCaps();
  const allowed = gpsSecureAvailable(caps);
  const activeFromDevice = (typeof state.gpsTagActive === 'boolean') ? !!state.gpsTagActive : (gpsToggleEnabled && gpsClientReady && allowed);
  const on = gpsToggleEnabled && allowed && activeFromDevice;

  if (block) block.className = 'stat gps ' + (on ? 'on' : 'off');
  if (stateEl) stateEl.textContent = on ? 'ON' : 'OFF';

  if (labelEl) {
    if (!allowed && caps.iphone && !caps.secure) labelEl.textContent = 'GPS (HTTPS only)';
    else if (!allowed) labelEl.textContent = 'GPS (Unavailable)';
    else labelEl.textContent = 'GPS';
  }

  if (btn) {
    btn.textContent = on ? 'GPS On' : 'GPS Off';
    btn.style.borderColor = on ? 'var(--green)' : 'var(--rose)';
    btn.style.color = on ? 'var(--green)' : 'var(--rose)';
    btn.disabled = !allowed;
    btn.title = !allowed
      ? (caps.iphone && !caps.secure ? 'iPhone GPS requires HTTPS.' : 'GPS needs secure HTTPS context.')
      : '';
  }
}

function formatCoord(v) {

function formatLocAge(ts) {
  const ageSec = Math.max(0, Math.floor((Date.now() - Number(ts || 0)) / 1000));
  if (ageSec < 60) return ageSec + 's ago';
  const min = Math.floor(ageSec / 60);
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  return hr + 'h ' + (min % 60) + 'm ago';
}

function renderGpsStatus() {
  const caps = gpsCaps();
  const el = $('#gpsStatus');
  if (!el) return;
  if (!caps.supported) {
    el.innerHTML = '<span class="gps-chip bad">GPS unavailable</span> Browser does not expose geolocation here. Use manual coordinates.';
    return;
  }
  if (!gpsToggleEnabled && caps.secure) {
    el.innerHTML = '<span class="gps-chip bad">GPS off</span> Enable GPS to allow location capture for camera pinning.';
    return;
  }
  if (!caps.secure) {
    if (caps.iphone) {
      el.innerHTML = '<span class="gps-chip bad">GPS off</span> iPhone Safari on HTTP cannot use geolocation. Open https://192.168.4.1 to enable GPS.';
    } else {
      el.innerHTML = '<span class="gps-chip bad">HTTPS required</span> Geolocation needs a secure context. Use https://192.168.4.1 or manual coordinates.';
    }
    return;
  }
  if (!gpsClientReady) {
    el.innerHTML = '<span class="gps-chip bad">GPS waiting</span> Phone is connected but not currently allowed to transmit GPS (check location permission).';
    return;
  }
  el.innerHTML = '<span class="gps-chip">GPS ready</span> Phone is connected and allowed to transmit GPS to the device.';

function getCurrentPosition() {

      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 2000
    });
  });
}

async function markCameraLocation(mac) {

// ── WebSocket ──
function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    $('#wsDot').className = 'dot on';
    wsRetryMs = 1500;
    ws.send('hi');
    pushGpsClientStatus(true);
  };
  ws.onclose = () => {
    $('#wsDot').className = 'dot off';
    setTimeout(wsConnect, wsRetryMs);
    wsRetryMs = Math.min(Math.floor(wsRetryMs * 1.5), 8000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = e => {
    try { applyIncomingState(JSON.parse(e.data)); } catch(ex) {}
  };
}

// ── API helpers ──
async function api(path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 8000);
  const opts = body
    ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body), signal:controller.signal}
    : {signal:controller.signal};
  try {
    const r = await fetch(path, opts);
    const text = await r.text();
    if (!text) return null;
    return JSON.parse(text);
  } catch(e) { return null; }
  finally { clearTimeout(timer); }
}

async function apiPostOk(path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 5000);
  try {
    const r = await fetch(path, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body || {}),
      signal:controller.signal
    });
    return !!r.ok;
  } catch(e) {
    return false;
  } finally {
    clearTimeout(timer);
  }
}

function rssiClass(r) { return r > -55 ? 'strong' : r > -75 ? 'medium' : 'weak'; }
function rssiColor(r) {
  const t = Math.min(1, Math.max(0, (r + 100) / 80));
  /* rose → amber → green gradient */
  const red = Math.round(251 - t * 177);
  const grn = Math.round(113 + t * 109);
  const blu = Math.round(113 * (1 - t) + 128 * t);
  return `rgb(${red},${grn},${blu})`;
}

function foxSeenDurationSec(d) {
  const first = d.firstSeen || 0;
  const last = d.lastSeen || first;
  const dur = last - first;
  return dur > 0 ? dur : 0;
}

function foxGroupNearbyDevices(list) {
  const nearby = [];
  const following = [];
  const detected = [];

  (list || []).forEach(d => {
    const age = foxSeenAgeSec(d);
    const seen = foxSeenDurationSec(d);
    const rssi = Number(d.rssi || -100);
    const best = Number(d.bestRssi || rssi);
    const hits = Number(d.hits || 0);

    const isNearby = age <= 8 && rssi >= -80;
    const isFollowing = !isNearby && age <= 12 && seen >= 20 && hits >= 4 && (rssi >= -82 || best >= -78);

    if (isNearby) nearby.push(d);
    else if (isFollowing) following.push(d);
    else detected.push(d);
  });

  nearby.sort((a,b) => (b.rssi - a.rssi) || (b.bestRssi - a.bestRssi) || ((b.hits||0) - (a.hits||0)));
  following.sort((a,b) => (foxSeenDurationSec(b) - foxSeenDurationSec(a)) || (b.rssi - a.rssi) || ((b.hits||0) - (a.hits||0)));
  detected.sort((a,b) => (foxSeenAgeSec(a) - foxSeenAgeSec(b)) || (b.rssi - a.rssi) || ((b.hits||0) - (a.hits||0)));

  return { nearby, following, detected };
}

function renderFoxBars(rssi) {
  const el = $('#foxBars'); if(!el) return;
  const pct = rssiPct(rssi);
  let html = '';
  for(let i = 0; i < 20; i++) {
    const active = (i / 20 * 100) < pct;
    const h = 10 + i * 1.5;
    html += `<div class="bar" style="height:${h}px;background:${active ? rssiColor(rssi) : '#27272a'}"></div>`;
  }
  el.innerHTML = html;
}

function updateFoxLedButton(ledMode, pending) {
  const btn = $('#foxLedBtn');

    btn.innerHTML = ledMode ? '&#9889; STING' : '&#9673; DETECTOR';
    btn.disabled = !!pending;
  }
  const hint = $('#foxLedHint');
  if (hint) {
    const base = ledMode
      ? 'Blue LED brightness scales with signal strength'
      : 'Green standby &rarr; blinking red on detection (faster = closer)';
    hint.innerHTML = pending ? (base + ' &middot; updating...') : base;
  }
}

async function toggleFoxLed() {
  if (foxLedToggleInFlight) return;
  const current = !!((state.fox || {}).ledMode);
  const next = !current;

  foxLedToggleInFlight = true;
  foxLedOptimistic = next;
  state.fox = Object.assign({}, state.fox || {}, { ledMode: next });
  updateFoxLedButton(next, true);

  let ok = await apiPostOk('/api/fox/ledmode', { mode: next ? 1 : 0 });
  if (!ok) {
    await new Promise(resolve => setTimeout(resolve, 220));
    ok = await apiPostOk('/api/fox/ledmode', { mode: next ? 1 : 0 });
  }

  if (!ok) {
    foxLedOptimistic = null;
    state.fox = Object.assign({}, state.fox || {}, { ledMode: current });
    updateFoxLedButton(current, false);
    toast('Detector mode toggle failed');
    foxLedToggleInFlight = false;
    return;
  }

  updateFoxLedButton(next, false);
  setTimeout(() => {
    if (foxLedOptimistic === next) foxLedOptimistic = null;
  }, 1600);
  foxLedToggleInFlight = false;
}

function setFoxTarget() {
  const mac = ($('#macInput') || {}).value;

}

          <button class="btn sm" style="border-color:var(--rose);color:var(--rose)"
            onclick="removeFromRegistry(${i})">&#10005;</button>
        </div>
      </div>
      <div class="drone-fields" style="grid-template-columns:1fr 1fr;margin-top:8px">
        <div>
          <dt style="margin-bottom:4px">Nickname Override</dt>
          <input class="input-sm" id="regNick_${i}" maxlength="23" value="${htmlEsc(r.nickname||'')}" placeholder="Friendly nickname">
        </div>
        <div>
          <dt style="margin-bottom:4px">Section Override</dt>
          <select class="sel-sm" id="regSection_${i}">${regSectionOptions(r.section)}</select>
        </div>
      </div>
      <div style="margin-top:8px">
        <dt style="margin-bottom:4px;color:var(--dim);font-size:12px">Notes</dt>
        <textarea class="txt-sm" id="regNotes_${i}" maxlength="95" placeholder="Operator notes, location notes, behavior notes...">${htmlEsc(r.notes||'')}</textarea>
      </div>
      <div style="margin-top:8px;display:flex;justify-content:flex-end">
        <button class="btn sm" style="border-color:var(--accent);color:var(--accent)" onclick="saveRegistryMeta(${i})">Save Details</button>
      </div>
    </div>`).join('');
}

async function saveRegistryMeta(idx) {
  const nickEl = $('#regNick_' + idx);
  const notesEl = $('#regNotes_' + idx);
  const sectionEl = $('#regSection_' + idx);
  const body = {
    index: idx,
    nickname: nickEl ? nickEl.value.trim() : '',
    notes: notesEl ? notesEl.value.trim() : '',
    section: sectionEl ? normRegSection(sectionEl.value) : 'auto'
  };
  const r = await api('/api/fox/registry/update', body);
  if(r && r.ok) {
    toast('Registry details saved');
    await fetchFoxRegistry();
    const el = $('#foxRegList'); if(el) el.innerHTML = renderFoxRegList();
  } else {
    toast('Failed to save details');
  }
}

async function addMacToRegistry() {
  const mac = ($('#macInput') || {}).value;
  const label = ($('#regLabelInput') || {}).value || '';
  if(!mac || mac.length < 17) { toast('Enter a valid MAC'); return; }
  const r = await api('/api/fox/registry', {mac, label, originalName: label || mac, section: 'known'});
  if(r && r.ok) { toast('Saved to registry'); fetchFoxRegistry().then(() => { const el=$('#foxRegList'); if(el) el.innerHTML=renderFoxRegList(); }); }
  else toast('Registry full or error');
}

async function saveTargetToRegistry() {
  const f = state.fox || {};
  if(!f.hasTarget) return;
  const label = prompt('Label for '+f.target+':', '') || '';
  const r = await api('/api/fox/registry', {mac: f.target, label, originalName: label || f.target, section: 'known'});
  if(r && r.ok) { toast('Saved to registry'); fetchFoxRegistry().then(() => { const el=$('#foxRegList'); if(el) el.innerHTML=renderFoxRegList(); }); }
  else toast('Registry full or already saved');
}

async function removeFromRegistry(idx) {
  try {
    await fetch('/api/fox/registry', {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({index:idx})});
    toast('Removed'); fetchFoxRegistry().then(() => { const el=$('#foxRegList'); if(el) el.innerHTML=renderFoxRegList(); });
  } catch(e) { toast('Error removing'); }
}


// ── Sky Spy View ──
function renderSky() {
  const c = $('#main');
  c.innerHTML = `
    <div class="card">
      <h2>Drone Detection Radar</h2>
      <div class="stats">
        <div class="stat highlight"><div class="val" id="sDroneCount" style="color:var(--skyblue)">${state.droneCount||0}</div><div class="lbl">Drones</div></div>
        <div class="stat"><div class="val" id="sWifiCount" style="color:var(--cyan)">--</div><div class="lbl">WiFi RID</div></div>
        <div class="stat"><div class="val" id="sBleCount" style="color:var(--skyblue)">--</div><div class="lbl">BLE RID</div></div>
      </div>
      ${state.droneCount === 0 ? `
        <div class="radar"><div class="radar-bg"></div><div class="radar-sweep"></div><div class="radar-dot"></div></div>
        <div class="empty" style="padding:10px;color:var(--blue)"><div>Scanning WiFi ch6 + BLE...</div>
        <div style="margin-top:6px;display:flex;gap:12px;justify-content:center;font-size:11px">
          <span style="color:var(--cyan)">&#9679; WiFi Active</span>
          <span style="color:var(--skyblue)">&#9679; BLE Active</span>
        </div></div>
      ` : ''}
    </div>
    <div id="droneList"></div>
    ${state.droneCount > 0 ? '<div class="card"><button class="btn sm" style="border-color:var(--skyblue);color:var(--skyblue)" onclick="fetchDrones().then(()=>renderDroneCards())">Refresh Details</button></div>' : ''}
  `;
  renderDroneCards();
}
function renderDroneCards() {
  const el = $('#droneList'); if(!el) return;
  let wifi=0, ble=0;
  let html = '';
  drones.forEach(d => {
    if(d.proto==='wifi') wifi++; else if(d.proto==='ble') ble++;
    html += `<div class="drone-card">
      <div class="drone-hdr">
        <span class="dev-mac">${d.id || d.mac}</span>
        <span class="drone-proto ${d.proto}">${d.proto}</span>
        <span class="dev-rssi ${rssiClass(d.rssi)}">${d.rssi} dBm</span>
      </div>
      <dl class="drone-fields">
        ${d.hasLoc ? `<dt>Position</dt><dd>${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</dd>` : ''}
        ${d.alt ? `<dt>Altitude</dt><dd>${d.alt.toFixed(1)}m</dd>` : ''}
        ${d.speed ? `<dt>Speed</dt><dd>${d.speed.toFixed(1)} m/s</dd>` : ''}
        ${d.hasPilot ? `<dt>Pilot</dt><dd>${d.pilotLat.toFixed(5)}, ${d.pilotLon.toFixed(5)}</dd>` : ''}
        ${d.opId ? `<dt>Operator</dt><dd>${d.opId}</dd>` : ''}
      </dl>
      <div style="margin-top:8px">
        <button class="btn sm" onclick="api('/api/fox/target',{mac:'${d.mac}'});setMode(2);toast('Tracking drone signal')">🎯 Track Signal</button>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  const wc = $('#sWifiCount'); if(wc) wc.textContent = wifi;
  const bc = $('#sBleCount'); if(bc) bc.textContent = ble;
}
function updateSkyLive() {
  const el = $('#sDroneCount'); if(el) el.textContent = state.droneCount || 0;
  if(state.droneCount > 0 && !drones.length) fetchDrones().then(() => renderSky());
}

function updateSetting(key, val) {
  const body = {};
  if(key==='brightness') body.brightness = parseInt(val);
  else if(key==='sound') body.sound = val;
  else if(key==='led') body.led = val;
  else if(key==='apBroadcast') body.apBroadcast = !!val;
  else if(key==='singleApName') body.singleApName = !!val;
  else if(key==='displaySleepSec') body.displaySleepSec = parseInt(val);
  else if(key==='menuLedColor') body.menuLedColor = parseInt(val);
  else if(key==='soundProfileFlock') body.soundProfileFlock = parseInt(val);
  else if(key==='soundProfileFox') body.soundProfileFox = parseInt(val);
  else if(key==='soundProfileSky') body.soundProfileSky = parseInt(val);
  else if(key==='shortcutModeBtn') body.shortcutModeBtn = parseInt(val);
  else if(key==='shortcutActionBtn') body.shortcutActionBtn = parseInt(val);
  else if(key==='shortcutBackBtn') body.shortcutBackBtn = parseInt(val);
  else if(key==='useMicrosdLogs') body.useMicrosdLogs = !!val;
  api('/api/settings', body);
}
