<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>OUI-Spy C6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a14;--card:#12132a;--border:#1e2040;
  --text:#e0e0f0;--dim:#707090;--accent:#6c63ff;
  --red:#ff4060;--green:#00e676;--orange:#ff9100;--blue:#40c4ff;
  --cyan:#00e5ff;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  font-size:14px;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

/* Header */
.hdr{border-bottom:1px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  transition:background .5s}
.hdr.mode-flock{background:linear-gradient(135deg,#2a1018,#1a0810)}
.hdr.mode-fox{background:linear-gradient(135deg,#2a1a08,#1a1005)}
.hdr.mode-sky{background:linear-gradient(135deg,#081a2a,#050e1a)}
.hdr.mode-settings,.hdr.mode-select{background:linear-gradient(135deg,#1a1b3a,#0d0e28)}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:1px}
.hdr h1 span{color:var(--accent)}
.hdr .status{display:flex;gap:10px;font-size:11px;color:var(--dim)}
.hdr .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.off{background:var(--red)}

/* Mode tabs */
.tabs{display:flex;gap:2px;padding:8px 12px;background:#0e0f22}
.tab{flex:1;padding:10px 6px;text-align:center;border-radius:8px;cursor:pointer;
  font-weight:600;font-size:12px;transition:all .2s;border:1px solid transparent;
  text-transform:uppercase;letter-spacing:.5px}
.tab:hover{border-color:var(--border);background:#181938}
.tab.active{border-color:var(--accent);background:rgba(108,99,255,.15);color:var(--accent)}
.tab.t-flock{--tc:var(--red)}.tab.t-flock.active{border-color:var(--red);color:var(--red);background:rgba(255,64,96,.1)}
.tab.t-fox{--tc:var(--orange)}.tab.t-fox.active{border-color:var(--orange);color:var(--orange);background:rgba(255,145,0,.1)}
.tab.t-sky{--tc:var(--blue)}.tab.t-sky.active{border-color:var(--blue);color:var(--blue);background:rgba(64,196,255,.1)}

/* Content area */
.content{padding:12px;transition:background .5s}
.content.mode-flock{background:linear-gradient(180deg,rgba(255,40,60,.04),transparent 40%)}
.content.mode-fox{background:linear-gradient(180deg,rgba(255,145,0,.04),transparent 40%)}
.content.mode-sky{background:linear-gradient(180deg,rgba(64,196,255,.04),transparent 40%)}
.content.mode-settings{background:linear-gradient(180deg,rgba(108,99,255,.04),transparent 40%)}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px;margin-bottom:10px}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px}

/* Stats row */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{text-align:center;padding:10px 6px;background:#0d0e24;border-radius:8px;border:1px solid var(--border)}
.stat .val{font-size:24px;font-weight:700;line-height:1.2}
.stat .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.stat.highlight .val{color:var(--accent)}

/* Mode-specific card accents */
.mode-flock .card{border-left:3px solid var(--red)}
.mode-flock .stat.highlight .val{color:var(--red)}
.mode-flock .card h2{color:var(--red)}
.mode-fox .card{border-left:3px solid var(--orange)}
.mode-fox .stat.highlight .val{color:var(--orange)}
.mode-fox .card h2{color:var(--orange)}
.mode-sky .card{border-left:3px solid var(--blue)}
.mode-sky .stat.highlight .val{color:var(--blue)}
.mode-sky .card h2{color:var(--blue)}
.mode-settings .card{border-left:3px solid var(--accent)}
.mode-settings .card h2{color:var(--accent)}

/* Device list */
.dev-list{max-height:50vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.dev-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s}
.dev-item:hover{background:rgba(108,99,255,.06)}
.dev-item:last-child{border-bottom:none}
.dev-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0}
.dev-icon.flock{background:rgba(255,64,96,.15);color:var(--red)}
.dev-icon.raven{background:rgba(255,145,0,.15);color:var(--orange)}
.dev-icon.drone{background:rgba(64,196,255,.15);color:var(--blue)}
.dev-icon.dji{background:rgba(255,145,0,.15);color:var(--orange)}
.dev-info{flex:1;min-width:0}
.dev-mac{font-family:'Consolas','Courier New',monospace;font-size:12px;font-weight:600}
.dev-name{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dev-rssi{text-align:right;font-weight:700;font-size:13px}
.dev-rssi.strong{color:var(--green)}.dev-rssi.medium{color:var(--orange)}.dev-rssi.weak{color:var(--red)}
.dev-actions{display:flex;gap:4px}

/* Buttons */
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);
  color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;
  text-transform:uppercase;letter-spacing:.5px}
.btn:hover{border-color:var(--accent);background:rgba(108,99,255,.12)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#5a52e0}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:rgba(255,64,96,.12)}
.btn.sm{padding:5px 10px;font-size:11px}

/* Proximity bar */
.prox-wrap{position:relative;height:28px;background:#0d0e24;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.prox-bar{height:100%;transition:width .3s,background .3s;border-radius:8px}
.prox-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;text-shadow:0 1px 3px rgba(0,0,0,.8)}

/* Fox hunter proximity */
.fox-target{text-align:center;padding:20px 0}
.fox-target .mac{font-family:monospace;font-size:20px;font-weight:700;color:var(--orange);margin:8px 0}
.fox-target .rssi-big{font-size:48px;font-weight:800;line-height:1}
.fox-target .unit{font-size:14px;color:var(--dim)}
.fox-target .best{font-size:12px;color:var(--dim);margin-top:4px}
.fox-signal{display:flex;gap:3px;justify-content:center;align-items:flex-end;height:40px;margin:12px 0}
.fox-signal .bar{width:6px;border-radius:3px;transition:height .3s,background .3s}

/* Drone cards */
.drone-card{background:#0d0e24;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.drone-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.drone-proto{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;text-transform:uppercase}
.drone-proto.wifi{background:rgba(64,196,255,.15);color:var(--blue)}
.drone-proto.ble{background:rgba(0,229,255,.15);color:var(--cyan)}
.drone-proto.dji{background:rgba(255,145,0,.15);color:var(--orange)}
.drone-fields{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:12px}
.drone-fields dt{color:var(--dim)}.drone-fields dd{font-weight:600}

/* Radar animation */
.radar{width:120px;height:120px;margin:20px auto;position:relative}
.radar-bg{width:100%;height:100%;border-radius:50%;border:1px solid var(--border);
  background:radial-gradient(circle,rgba(64,196,255,.05),transparent)}
.radar-sweep{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0deg,rgba(64,196,255,.2) 30deg,transparent 60deg);
  animation:sweep 3s linear infinite}
.radar-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--red);
  box-shadow:0 0 8px var(--red);top:50%;left:50%;transform:translate(-50%,-50%)}
@keyframes sweep{to{transform:rotate(360deg)}}

/* Settings panel */
.settings{display:grid;gap:10px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:13px}
.toggle{position:relative;width:42px;height:24px;cursor:pointer}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:#333;border-radius:12px;transition:background .2s}
.toggle .slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider:before{transform:translateX(18px)}
input[type=range]{width:100%;accent-color:var(--accent)}
.input-mac{background:#0d0e24;border:1px solid var(--border);border-radius:6px;padding:8px 12px;
  color:var(--text);font-family:monospace;font-size:14px;width:100%;outline:none}
.input-mac:focus{border-color:var(--accent)}

/* Footer */
.ftr{text-align:center;padding:16px;font-size:11px;color:var(--dim);border-top:1px solid var(--border)}

/* Toast notifications */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);
  color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

/* No data state */
.empty{text-align:center;padding:30px 20px;color:var(--dim)}
.empty .icon{font-size:36px;margin-bottom:8px}

/* Animations */
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{animation:fadein .3s ease}

/* Mobile optimizations */
@media(max-width:400px){
  .stats{grid-template-columns:1fr 1fr}
  .stat .val{font-size:20px}
  .tab{font-size:10px;padding:8px 4px}
}
</style>
</head>
<body>

<div class="hdr">
  <h1>OUI<span>-SPY</span> <small style="font-size:11px;color:var(--dim)">C6</small></h1>
  <div class="status">
    <span><span class="dot on" id="wsDot"></span>WS</span>
    <span id="heapInfo">--</span>
    <span id="uptimeInfo">--</span>
  </div>
</div>

<div class="tabs">
  <div class="tab t-flock" data-mode="1" onclick="setMode(1)">Flock You</div>
  <div class="tab t-fox" data-mode="2" onclick="setMode(2)">Fox Hunter</div>
  <div class="tab t-sky" data-mode="3" onclick="setMode(3)">Sky Spy</div>
  <div class="tab" data-mode="0" onclick="setMode(0)">&#9881;</div>
</div>

<div class="content" id="main">
  <!-- Dynamic content injected by JS -->
</div>

<div class="ftr">OUI-Spy C6 &mdash; Open Source RF Intelligence &mdash; <a href="https://github.com/colonelpanichacks/ouispy-c6">GitHub</a></div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let ws, state = {}, devices = [], drones = [];
let currentView = -1; // track which view is shown

// ── WebSocket ──
function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => { $('#wsDot').className = 'dot on'; ws.send('hi'); };
  ws.onclose = () => { $('#wsDot').className = 'dot off'; setTimeout(wsConnect, 2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = e => {
    try { state = JSON.parse(e.data); updateUI(); } catch(ex) {}
  };
}

// ── API helpers ──
async function api(path, body) {
  const opts = body ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)} : {};
  try {
    const r = await fetch(path, opts);
    return await r.json();
  } catch(e) { return null; }
}

async function fetchDevices() { devices = await api('/api/devices') || []; }
async function fetchDrones()  { drones  = await api('/api/drones') || []; }

function setMode(m) {
  api('/api/mode', {mode: m});
  toast(['Mode Select','Flock You','Fox Hunter','Sky Spy'][m] + ' requested');
}

function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── RSSI helpers ──
function rssiClass(r) { return r > -55 ? 'strong' : r > -75 ? 'medium' : 'weak'; }
function rssiColor(r) {
  const t = Math.min(1, Math.max(0, (r + 100) / 80));
  const red = Math.round(255 * (1 - t));
  const grn = Math.round(255 * t);
  return `rgb(${red},${grn},0)`;
}
function rssiPct(r) { return Math.min(100, Math.max(0, (r + 100) * 100 / 80)); }
function fmtTime(s) { const m = Math.floor(s/60), h = Math.floor(m/60); return h > 0 ? h+'h '+m%60+'m' : m+'m '+s%60+'s'; }

// ── Tab highlighting + mode theming ──
function updateTabs() {
  $$('.tab').forEach(t => t.classList.toggle('active', parseInt(t.dataset.mode) === state.mode));
  const modeClasses = ['mode-settings', 'mode-flock', 'mode-fox', 'mode-sky'];
  const cls = modeClasses[state.mode] || 'mode-settings';
  ['#main', '.hdr'].forEach(sel => {
    const el = $(sel);
    if(el) { modeClasses.forEach(c => el.classList.remove(c)); el.classList.add(cls); }
  });
}

// ── Main render loop ──
function updateUI() {
  $('#heapInfo').textContent = Math.round((state.heap||0)/1024) + 'kB';
  $('#uptimeInfo').textContent = fmtTime(state.uptime || 0);
  updateTabs();

  const m = state.mode;
  if (m !== currentView) {
    currentView = m;
    if (m === 1) fetchDevices().then(() => renderFlock());
    else if (m === 2) renderFox();
    else if (m === 3) fetchDrones().then(() => renderSky());
    else renderSettings();
  } else {
    // Live update within current view
    if (m === 1) updateFlockLive();
    else if (m === 2) updateFoxLive();
    else if (m === 3) updateSkyLive();
  }
}

// ── Flock You View ──
let flockRefresh = 0;
function renderFlock() {
  const c = $('#main');
  c.innerHTML = `
    <div class="card">
      <h2>Surveillance Hardware Scanner</h2>
      <div class="stats">
        <div class="stat highlight"><div class="val" id="fDevCount">${state.deviceCount||0}</div><div class="lbl">Detected</div></div>
        <div class="stat"><div class="val" id="fFlockCount" style="color:var(--red)">--</div><div class="lbl">Flock</div></div>
        <div class="stat"><div class="val" id="fRavenCount" style="color:var(--orange)">--</div><div class="lbl">Raven</div></div>
      </div>
    </div>
    <div class="card">
      <h2>Detected Devices</h2>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <button class="btn sm" style="border-color:var(--red);color:var(--red)" onclick="fetchDevices().then(()=>renderDevList())">Refresh</button>
        <a class="btn sm" href="/api/export/csv" target="_blank">Export CSV</a>
      </div>
      <div id="devList" class="dev-list"></div>
    </div>`;
  renderDevList();
}
function renderDevList() {
  const el = $('#devList');
  if (!devices.length) { el.innerHTML = '<div class="empty"><div class="icon">📡</div>Scanning for devices...</div>'; return; }
  let flock = 0, raven = 0;
  let html = '';
  devices.forEach((d, i) => {
    if(d.flock) flock++;
    if(d.raven) raven++;
    const ic = d.raven ? 'raven' : 'flock';
    const sym = d.raven ? '🔊' : '📷';
    html += `<div class="dev-item" onclick="trackDevice(${i})">
      <div class="dev-icon ${ic}">${sym}</div>
      <div class="dev-info">
        <div class="dev-mac">${d.mac}</div>
        <div class="dev-name">${d.name || 'Unknown'} &middot; ${d.hits} hits &middot; ${d.raven ? 'Raven FW '+d.ravenFw+'.x' : flagsStr(d.flags)}</div>
      </div>
      <div class="dev-rssi ${rssiClass(d.rssi)}">${d.rssi}</div>
      <div class="dev-actions"><button class="btn sm" onclick="event.stopPropagation();trackDevice(${i})">🎯</button></div>
    </div>`;
  });
  el.innerHTML = html;
  const fc = $('#fFlockCount'); if(fc) fc.textContent = flock;
  const rc = $('#fRavenCount'); if(rc) rc.textContent = raven;
}
function updateFlockLive() {
  const el = $('#fDevCount'); if(el) el.textContent = state.deviceCount || 0;
  if (++flockRefresh % 6 === 0) fetchDevices().then(() => renderDevList());
}
function flagsStr(f) {
  const parts = [];
  if(f&1) parts.push('OUI');
  if(f&2) parts.push('Name');
  if(f&4) parts.push('CID');
  if(f&8) parts.push('UUID');
  return parts.join('+') || 'BLE';
}
function trackDevice(i) {
  api('/api/fox/target', {index: i});
  setMode(2);
  toast('Target set → Fox Hunter');
}

// ── Fox Hunter View ──
function renderFox() {
  const f = state.fox || {};
  const c = $('#main');
  c.innerHTML = `
    <div class="card">
      <h2>Proximity Tracker</h2>
      <div class="fox-target" id="foxTarget">
        ${f.hasTarget ? `
          <div style="font-size:10px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;font-weight:700">&#9678; TARGET LOCKED</div>
          <div class="mac" id="foxMac">${f.target}</div>
          <div class="rssi-big" id="foxRssi" style="color:${rssiColor(f.rssi)}">${f.found ? f.rssi : '--'}</div>
          <div class="unit">dBm</div>
          <div class="best" id="foxBest">Best: ${f.bestRssi} dBm</div>
          <div class="fox-signal" id="foxBars"></div>
          <div class="prox-wrap" style="margin-top:12px;border-color:var(--orange)">
            <div class="prox-bar" id="foxBar" style="width:${rssiPct(f.rssi)}%;background:${rssiColor(f.rssi)}"></div>
            <div class="prox-label" id="foxPct">${Math.round(rssiPct(f.rssi))}%</div>
          </div>
          <div style="margin-top:12px;font-size:13px;font-weight:700;letter-spacing:1px;color:${f.found?'var(--green)':'var(--red)'}">${f.found?'&#9679; TRACKING':'&#9675; SIGNAL LOST'}</div>
        ` : `
          <div class="empty"><div class="icon" style="color:var(--orange)">&#9678;</div>No target selected<br><small style="color:var(--orange)">Use Flock You to find devices, or enter MAC below</small></div>
        `}
      </div>
    </div>
    <div class="card">
      <h2>Set Target</h2>
      <div style="display:flex;gap:8px">
        <input type="text" class="input-mac" id="macInput" placeholder="AA:BB:CC:DD:EE:FF" maxlength="17" style="border-color:rgba(255,145,0,.3)">
        <button class="btn primary" style="background:var(--orange);border-color:var(--orange)" onclick="setFoxTarget()">Lock</button>
      </div>
      ${devices.length ? `<div style="margin-top:10px"><h2>From Flock You (${devices.length})</h2>
        <div class="dev-list" style="max-height:30vh">${devices.map((d,i) => `
          <div class="dev-item" onclick="api('/api/fox/target',{index:${i}});toast('Locked on '+${JSON.stringify(d.mac)})">
            <div class="dev-icon flock">📷</div>
            <div class="dev-info"><div class="dev-mac">${d.mac}</div><div class="dev-name">${d.name||'Unknown'}</div></div>
            <div class="dev-rssi ${rssiClass(d.rssi)}">${d.rssi}</div>
          </div>`).join('')}
        </div></div>` : ''}
    </div>`;
  renderFoxBars(f.rssi || -100);
}
function renderFoxBars(rssi) {
  const el = $('#foxBars'); if(!el) return;
  const pct = rssiPct(rssi);
  let html = '';
  for(let i = 0; i < 20; i++) {
    const active = (i / 20 * 100) < pct;
    const h = 10 + i * 1.5;
    html += `<div class="bar" style="height:${h}px;background:${active ? rssiColor(rssi) : '#222'}"></div>`;
  }
  el.innerHTML = html;
}
function updateFoxLive() {
  const f = state.fox || {};
  const el = $('#foxRssi'); if(el) { el.textContent = f.found ? f.rssi : '--'; el.style.color = rssiColor(f.rssi); }
  const best = $('#foxBest'); if(best) best.textContent = 'Best: ' + f.bestRssi + ' dBm';
  const bar = $('#foxBar'); if(bar) { bar.style.width = rssiPct(f.rssi) + '%'; bar.style.background = rssiColor(f.rssi); }
  const pct = $('#foxPct'); if(pct) pct.textContent = Math.round(rssiPct(f.rssi)) + '%';
  renderFoxBars(f.rssi || -100);
}
function setFoxTarget() {
  const mac = ($('#macInput') || {}).value;
  if(mac && mac.length >= 17) { api('/api/fox/target', {mac}); toast('Target set: ' + mac); }
  else toast('Enter a valid MAC address');
}

// ── Sky Spy View ──
function renderSky() {
  const c = $('#main');
  c.innerHTML = `
    <div class="card">
      <h2>Drone Detection Radar</h2>
      <div class="stats">
        <div class="stat highlight"><div class="val" id="sDroneCount" style="color:var(--blue)">${state.droneCount||0}</div><div class="lbl">Drones</div></div>
        <div class="stat"><div class="val" id="sWifiCount" style="color:var(--cyan)">--</div><div class="lbl">WiFi RID</div></div>
        <div class="stat"><div class="val" id="sBleCount" style="color:var(--blue)">--</div><div class="lbl">BLE RID</div></div>
      </div>
      ${state.droneCount === 0 ? `
        <div class="radar"><div class="radar-bg"></div><div class="radar-sweep"></div><div class="radar-dot"></div></div>
        <div class="empty" style="padding:10px;color:var(--blue)"><div>Scanning WiFi ch6 + BLE...</div>
        <div style="margin-top:6px;display:flex;gap:12px;justify-content:center;font-size:11px">
          <span style="color:var(--cyan)">&#9679; WiFi Active</span>
          <span style="color:var(--blue)">&#9679; BLE Active</span>
        </div></div>
      ` : ''}
    </div>
    <div id="droneList"></div>
    ${state.droneCount > 0 ? '<div class="card"><button class="btn sm" style="border-color:var(--blue);color:var(--blue)" onclick="fetchDrones().then(()=>renderDroneCards())">Refresh Details</button></div>' : ''}
  `;
  renderDroneCards();
}
function renderDroneCards() {
  const el = $('#droneList'); if(!el) return;
  let wifi=0, ble=0;
  let html = '';
  drones.forEach(d => {
    if(d.proto==='wifi') wifi++; else if(d.proto==='ble') ble++;
    html += `<div class="drone-card">
      <div class="drone-hdr">
        <span class="dev-mac">${d.id || d.mac}</span>
        <span class="drone-proto ${d.proto}">${d.proto}</span>
        <span class="dev-rssi ${rssiClass(d.rssi)}">${d.rssi} dBm</span>
      </div>
      <dl class="drone-fields">
        ${d.hasLoc ? `<dt>Position</dt><dd>${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</dd>` : ''}
        ${d.alt ? `<dt>Altitude</dt><dd>${d.alt.toFixed(1)}m</dd>` : ''}
        ${d.speed ? `<dt>Speed</dt><dd>${d.speed.toFixed(1)} m/s</dd>` : ''}
        ${d.hasPilot ? `<dt>Pilot</dt><dd>${d.pilotLat.toFixed(5)}, ${d.pilotLon.toFixed(5)}</dd>` : ''}
        ${d.opId ? `<dt>Operator</dt><dd>${d.opId}</dd>` : ''}
      </dl>
      <div style="margin-top:8px">
        <button class="btn sm" onclick="api('/api/fox/target',{mac:'${d.mac}'});setMode(2);toast('Tracking drone signal')">🎯 Track Signal</button>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  const wc = $('#sWifiCount'); if(wc) wc.textContent = wifi;
  const bc = $('#sBleCount'); if(bc) bc.textContent = ble;
}
function updateSkyLive() {
  const el = $('#sDroneCount'); if(el) el.textContent = state.droneCount || 0;
  if(state.droneCount > 0 && !drones.length) fetchDrones().then(() => renderSky());
}

// ── Settings View ──
function renderSettings() {
  const c = $('#main');
  c.innerHTML = `
    <div class="card">
      <h2>Settings</h2>
      <div class="settings">
        <div class="setting-row">
          <label>Display Brightness</label>
          <input type="range" min="10" max="255" value="${state.brightness||200}" oninput="updateSetting('brightness',this.value)" style="width:140px">
        </div>
        <div class="setting-row">
          <label>Sound Effects</label>
          <label class="toggle"><input type="checkbox" ${state.sound?'checked':''} onchange="updateSetting('sound',this.checked)"><span class="slider"></span></label>
        </div>
        <div class="setting-row">
          <label>RGB LED</label>
          <label class="toggle"><input type="checkbox" ${state.led?'checked':''} onchange="updateSetting('led',this.checked)"><span class="slider"></span></label>
        </div>
      </div>
    </div>
    <div class="card">
      <h2>System Info</h2>
      <div style="font-size:12px;line-height:1.8">
        <div>Free Heap: <strong>${Math.round((state.heap||0)/1024)} kB</strong></div>
        <div>Uptime: <strong>${fmtTime(state.uptime||0)}</strong></div>
        <div>WiFi Clients: <strong>${state.clients||0}</strong></div>
        <div>Mode: <strong>${['Select','Flock You','Fox Hunter','Sky Spy'][state.mode||0]}</strong></div>
        <div>Flock Devices: <strong>${state.deviceCount||0}</strong></div>
        <div>Drones Tracked: <strong>${state.droneCount||0}</strong></div>
      </div>
    </div>
    <div class="card">
      <h2>Quick Actions</h2>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn" style="border-color:var(--red);color:var(--red)" onclick="setMode(1)">Start Flock You</button>
        <button class="btn" style="border-color:var(--orange);color:var(--orange)" onclick="setMode(2)">Start Fox Hunter</button>
        <button class="btn" style="border-color:var(--blue);color:var(--blue)" onclick="setMode(3)">Start Sky Spy</button>
      </div>
    </div>
    <div class="card">
      <h2>About</h2>
      <p style="font-size:12px;color:var(--dim);line-height:1.6">
        OUI-Spy C6 is open-source RF intelligence firmware for the Waveshare ESP32-C6-LCD-1.47.
        It detects Flock Safety ALPR cameras, ShotSpotter Raven sensors, and drones broadcasting
        ASTM F3411 Remote ID or DJI DroneID. Built with ESP-IDF in pure C.<br><br>
        Connect external push buttons and a piezo speaker for standalone operation without a phone.
        See the HARDWARE.md file for wiring instructions.
      </p>
    </div>`;
}
function updateSetting(key, val) {
  const body = {};
  if(key==='brightness') body.brightness = parseInt(val);
  else if(key==='sound') body.sound = val;
  else if(key==='led') body.led = val;
  api('/api/settings', body);
}

// ── Init ──
wsConnect();
setInterval(() => { if(ws && ws.readyState===1) ws.send('ping'); }, 3000);
// Also poll state in case WS is slow
setInterval(async () => {
  const s = await api('/api/state');
  if(s) { state = s; updateUI(); }
}, 2000);
</script>
</body>
</html>
