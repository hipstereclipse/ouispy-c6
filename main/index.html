<body>

<div class="hdr">
  <h1 class="logo-btn" onclick="goMainMenu()">OUI<span>-SPY</span> <small style="font-size:11px;color:var(--dim)">C6</small></h1>
  <div class="status">
    <span><span class="dot on" id="wsDot"></span>WS</span>
    <span id="heapInfo">--</span>
    <span id="uptimeInfo">--</span>
    <span class="status-pill off" id="logStatusHdr">LOG OFF</span>
  </div>
</div>

<div class="tabs">
  <div class="tab t-flock" data-mode="1" onclick="setMode(1)">Flock You</div>
  <div class="tab t-fox" data-mode="2" onclick="setMode(2)">Fox Hunter</div>
  <div class="tab t-sky" data-mode="3" onclick="setMode(3)">Sky Spy</div>
  <div class="tab" data-mode="4" onclick="setMode(4)">&#9881;</div>
</div>

<div id="wifiBar"></div>
<div class="content" id="main">
  <!-- Dynamic content injected by JS -->
</div>

<div class="ftr">OUI-Spy C6 &mdash; Open Source RF Intelligence &mdash; <a href="https://github.com/colonelpanichacks/ouispy-c6">GitHub</a></div>

<div class="toast" id="toast"></div>
<div class="dialog-overlay" id="confirmOverlay" onclick="handleConfirmOverlayClick(event)">
  <div class="dialog">
    <h3 id="confirmTitle">Confirm Delete</h3>
    <p id="confirmMessage">Are you sure you want to delete this?</p>
    <div class="sub">Click once to cancel, or hold the confirm button for 3 seconds.</div>
    <div class="dialog-actions">
      <button class="btn" onclick="hideHoldConfirm()">Cancel</button>
      <button class="btn danger hold-btn" id="confirmHoldBtn"
        onmousedown="beginHoldConfirm()" onmouseup="cancelHoldConfirmPress()" onmouseleave="cancelHoldConfirmPress()"
        ontouchstart="beginHoldConfirm(event)" ontouchend="cancelHoldConfirmPress()" ontouchcancel="cancelHoldConfirmPress()">
        <span class="fill" id="confirmHoldFill"></span>
        <span class="label" id="confirmHoldLabel">Hold 3s to confirm</span>
      </button>
    </div>
  </div>
</div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let ws, state = {}, devices = [], drones = [];
let wsRetryMs = 1500;
let wsReconnectTimer = null;
let wsConnectInFlight = false;
let currentView = -1; // track which view is shown
let modeRenderSeq = 0;
let uiFramePending = false;
let pageSwitchPending = false;
let modeSwitchInFlight = false;
let foxLedToggleInFlight = false;
let foxLedOptimistic = null;
let gpsClientReady = false;
let gpsReadyLastPushMs = 0;
let gpsReadyLastSent = null;
let gpsReadyPushInFlight = false;
let gpsWatchId = null;
let gpsWatchLastFixMs = 0;
let gpsWatchStartMs = 0;
let gpsWatchRestartTimer = null;
let lastBrowserPosition = null;
let flockMapVisible = false;
let flockMapTapCount = 0;
let flockMapLastTapMs = 0;
let flockMapTileDir = null;
let flockMapDeviceTilesAvailable = null;
let flockMapDeviceMaxZoom = null;
let flockMapDeviceAvailableZooms = null;
let flockMapDeviceLcdTilesAvailable = null;
let flockMapDeviceLcdMaxZoom = null;
let flockMapDeviceLcdAvailableZooms = null;
let flockMapDeviceFallbackCenter = null;
let flockMapLocalAvailableZooms = null;
let flockMapZoomLevel = 14;
let flockMapDrawToken = 0;
let flockMapAlertDismissed = false;
let flockMapDeviceDebug = null;
let flockMapRenderDebug = null;
let flockMapTileAttempts = [];
let sharedMapPushTimer = null;
let sharedMapPushInFlight = false;
let sharedMapPushPending = false;
let sharedMapLastPayload = '';
let flockAutoMarkInFlight = false;
let foxRegistrySortMode = 'recent';
let logsData = null;
let logsRefreshCounter = 0;
let logsRefreshInFlight = false;
let logFilter = 'all';
let foxViewFilter = 'priority';
let foxSearchQuery = '';
let foxSelectedMac = '';
let skyRadarAnimId = 0;
let skyRadarAngle = 0;
const CAM_LOC_STORE_KEY = 'ouispy_cam_locs_v1';
const GPS_TOGGLE_STORE_KEY = 'ouispy_gps_toggle_v1';
let settingsSection = 'preferences';
let confirmHoldStartedMs = 0;
let confirmHoldTimer = null;
let confirmHoldInterval = null;
let confirmAction = null;
let cameraLocations = loadCameraLocations();
let gpsToggleEnabled = loadGpsToggleEnabled();
const SHARED_MAP_SYNC_DELAY_MS = 250;
const FLOCK_AUTO_MARK_STALE_SEC = 15;
const FLOCK_AUTO_MARK_REFRESH_MS = 60000;
const FLOCK_AUTO_MARK_MOVE_M = 20;

function setMainSwitching(active) {
  const main = $('#main');
  if (main) main.classList.toggle('switching', !!active);
}

function scheduleUIUpdate(withPageTransition) {
  if (withPageTransition) {
    pageSwitchPending = true;
    setMainSwitching(true);
  }
  if (uiFramePending) return;
  uiFramePending = true;
  requestAnimationFrame(() => {
    uiFramePending = false;
    updateUI();
    if (pageSwitchPending) {
      setTimeout(() => {
        setMainSwitching(false);
        pageSwitchPending = false;
      }, 140);
    }
  });
}

function applyIncomingState(nextState) {
  state = nextState || {};
  if (typeof state.gpsTagging === 'boolean') {
    gpsToggleEnabled = !!state.gpsTagging;
  }
  if (typeof state.gpsClientReady === 'boolean') {
    gpsClientReady = !!state.gpsClientReady;
  }
  if (foxLedOptimistic !== null) {
    const serverLed = !!((state.fox || {}).ledMode);
    if (serverLed === !!foxLedOptimistic) {
      foxLedOptimistic = null;
    } else {
      state.fox = Object.assign({}, state.fox || {}, { ledMode: !!foxLedOptimistic });
    }
  }
  scheduleUIUpdate(false);
}

function loadCameraLocations() {
  try {
    const raw = localStorage.getItem(CAM_LOC_STORE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return (obj && typeof obj === 'object') ? obj : {};
  } catch (e) {
    return {};
  }
}

function saveCameraLocations() {
  try { localStorage.setItem(CAM_LOC_STORE_KEY, JSON.stringify(cameraLocations)); } catch (e) {}
  scheduleSharedMapSync(false);
}

function loadGpsToggleEnabled() {
  try {
    return localStorage.getItem(GPS_TOGGLE_STORE_KEY) === 'on';
  } catch (e) {
    return false;
  }
}

function saveGpsToggleEnabled() {
  try { localStorage.setItem(GPS_TOGGLE_STORE_KEY, gpsToggleEnabled ? 'on' : 'off'); } catch (e) {}
}

function browserPositionFresh(maxAgeMs) {
  const limit = Number(maxAgeMs || 20000);
  if (!lastBrowserPosition) return false;
  if (!Number.isFinite(Number(lastBrowserPosition.lat)) || !Number.isFinite(Number(lastBrowserPosition.lon))) return false;
  return (Date.now() - Number(lastBrowserPosition.ts || 0)) <= limit;
}

function mapPinKindCode(kind) {
  if (kind === 'fox') return 1;
  if (kind === 'drone') return 2;
  if (kind === 'self') return 3;
  return 0;
}

function browserLocationMapPin() {
  if (!lastBrowserPosition) return null;
  const lat = Number(lastBrowserPosition.lat);
  const lon = Number(lastBrowserPosition.lon);
  if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
  const fresh = browserPositionFresh(30000);
  return {
    mac: 'BROWSER-GPS',
    name: fresh ? 'Current device location' : 'Last device location',
    lat,
    lon,
    kind: 'self',
    radiusM: Math.max(10, fresh ? 18 : 30),
    source: fresh ? 'gps-live' : 'gps-last',
    rssi: -30,
    age: formatLocAge(lastBrowserPosition.ts)
  };
}

function flockMapRenderablePins() {
  const pins = flockMapPins();
  if (!gpsEffectiveEnabled()) return pins;
  const selfPin = browserLocationMapPin();
  if (selfPin) pins.push(selfPin);
  return pins;
}

function buildSharedMapPinsPayload() {
  return flockMapRenderablePins().slice(0, 48).map(pin => ({
    mac: String(pin.mac || '').toUpperCase(),
    label: String(pin.name || '').slice(0, 24),
    lat: Number(pin.lat),
    lon: Number(pin.lon),
    radiusM: Number(pin.radiusM || 0),
    rssi: Number(pin.rssi || -85),
    kind: mapPinKindCode(pin.kind)
  }));
}

async function pushSharedMapPinsToDevice(force) {
  const pins = buildSharedMapPinsPayload();
  const payloadText = JSON.stringify(pins);
  if (!force && payloadText === sharedMapLastPayload) return true;
  if (sharedMapPushInFlight) {
    sharedMapPushPending = true;
    return false;
  }

  sharedMapPushInFlight = true;
  try {
    const ok = await apiPostOk('/api/map/pins', { pins });
    if (ok) sharedMapLastPayload = payloadText;
    return ok;
  } finally {
    sharedMapPushInFlight = false;
    if (sharedMapPushPending) {
      sharedMapPushPending = false;
      scheduleSharedMapSync(true);
    }
  }
}

function scheduleSharedMapSync(immediate) {
  if (sharedMapPushTimer) {
    clearTimeout(sharedMapPushTimer);
    sharedMapPushTimer = null;
  }
  if (immediate) {
    void pushSharedMapPinsToDevice(true);
    return;
  }
  sharedMapPushTimer = setTimeout(() => {
    sharedMapPushTimer = null;
    void pushSharedMapPinsToDevice(false);
  }, SHARED_MAP_SYNC_DELAY_MS);
}

function shouldAutoMarkFlockDevice(device, position) {
  if (!device || !device.flock || !position) return false;

  const uptimeSec = Number(state.uptime || 0);
  const lastSeenSec = Number(device.lastSeen || 0);
  if (uptimeSec > 0 && lastSeenSec > 0 && (uptimeSec - lastSeenSec) > FLOCK_AUTO_MARK_STALE_SEC) {
    return false;
  }

  const prev = getStoredLocation(device.mac);
  if (!prev) return true;
  if (String(prev.source || '').toLowerCase() === 'manual') return false;
  if (!Number.isFinite(Number(prev.lat)) || !Number.isFinite(Number(prev.lon))) return true;

  const ageMs = Date.now() - Number(prev.ts || 0);
  if (ageMs < FLOCK_AUTO_MARK_REFRESH_MS) return false;

  return approxDistanceM(prev.lat, prev.lon, position.lat, position.lon) >= FLOCK_AUTO_MARK_MOVE_M;
}

async function autoMarkFlockDevices() {
  if (flockAutoMarkInFlight) return false;
  if (Number(state.mode) !== 1) return false;
  if (!gpsEffectiveEnabled() || !gpsClientReady || !browserPositionFresh(20000)) return false;
  if (!Array.isArray(devices) || !devices.length) return false;

  const position = {
    lat: Number(lastBrowserPosition.lat),
    lon: Number(lastBrowserPosition.lon)
  };
  flockAutoMarkInFlight = true;
  let changed = false;
  try {
    devices.forEach(device => {
      if (!shouldAutoMarkFlockDevice(device, position)) return;
      saveCameraLocation(
        device.mac,
        position.lat,
        position.lon,
        'gps',
        Number(device.rssi || -85),
        'flock',
        'flock'
      );
      changed = true;
    });
  } finally {
    flockAutoMarkInFlight = false;
  }

  return changed;
}

function isIphoneFamily() {
  const ua = navigator.userAgent || '';
  return /iPhone|iPad|iPod/i.test(ua);
}

function gpsCaps() {
  const secureHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  return {
    supported: !!navigator.geolocation,
    secure: !!window.isSecureContext || secureHost,
    iphone: isIphoneFamily()
  };
}

function gpsSecureAvailable(caps) {
  const c = caps || gpsCaps();
  return c.supported && c.secure;
}

function computedGpsReady() {
  const caps = gpsCaps();
  if (!gpsToggleEnabled || !caps.supported || !caps.secure) return false;
  const now = Date.now();
  if (gpsWatchLastFixMs && (now - gpsWatchLastFixMs) <= 20000) return true;
  if (gpsWatchId !== null && gpsWatchStartMs && (now - gpsWatchStartMs) <= 20000) return true;
  return false;
}

function gpsWatcherLooksStale() {
  const now = Date.now();
  if (gpsWatchId === null) return false;
  if (gpsWatchLastFixMs) return (now - gpsWatchLastFixMs) > 18000;
  if (gpsWatchStartMs) return (now - gpsWatchStartMs) > 18000;
  return false;
}

function scheduleGpsWatcherRestart(delayMs) {
  if (gpsWatchRestartTimer) clearTimeout(gpsWatchRestartTimer);
  gpsWatchRestartTimer = setTimeout(() => {
    gpsWatchRestartTimer = null;
    stopGpsWatcher();
    startGpsWatcher();
    syncGpsClientStatus(true);
  }, Math.max(250, Number(delayMs || 0)));
}

function stopGpsWatcher() {
  if (gpsWatchRestartTimer) {
    clearTimeout(gpsWatchRestartTimer);
    gpsWatchRestartTimer = null;
  }
  if (gpsWatchId !== null && navigator.geolocation) {
    try { navigator.geolocation.clearWatch(gpsWatchId); } catch (e) {}
  }
  gpsWatchId = null;
  gpsWatchStartMs = 0;
  gpsWatchLastFixMs = 0;
}

function startGpsWatcher() {
  const caps = gpsCaps();
  if (!gpsToggleEnabled || !caps.supported || !caps.secure || !navigator.geolocation) {
    stopGpsWatcher();
    return;
  }
  if (gpsWatchId !== null) {
    if (!gpsWatcherLooksStale()) return;
    stopGpsWatcher();
  }

  gpsWatchStartMs = Date.now();
  gpsWatchId = navigator.geolocation.watchPosition(pos => {
    gpsWatchLastFixMs = Date.now();
    lastBrowserPosition = {
      lat: pos.coords.latitude,
      lon: pos.coords.longitude,
      ts: gpsWatchLastFixMs
    };
    scheduleSharedMapSync(false);
    syncGpsClientStatus(true);
    renderGpsStatus();
    renderGpsToggleBlock();
    if (Number(state.mode) === 1) {
      renderFlockMapPanel();
      if (flockMapVisible) drawFlockMap();
      void autoMarkFlockDevices().then(changed => {
        if (changed) renderDevList();
      });
    }
    if (Number(state.mode) === 3) renderSkyGpsWidgets();
  }, err => {
    if (err && err.code === 1) {
      stopGpsWatcher();
      syncGpsClientStatus(true);
      renderGpsStatus();
      renderGpsToggleBlock();
      if (Number(state.mode) === 3) renderSkyGpsWidgets();
      return;
    }
    if (gpsWatchLastFixMs && (Date.now() - gpsWatchLastFixMs) <= 20000) return;
    scheduleGpsWatcherRestart(900);
    syncGpsClientStatus(true);
  }, {
    enableHighAccuracy: true,
    timeout: 15000,
    maximumAge: 2000
  });
}

async function syncGpsClientStatus(force) {
  if (document.hidden && !force) return;
  const ready = computedGpsReady();
  const changed = (gpsClientReady !== ready);
  gpsClientReady = ready;

  // Re-render GPS UI whenever readiness changes
  if (changed) {
    renderGpsStatus();
    renderGpsToggleBlock();
    if (Number(state.mode) === 1) renderFlockMapPanel();
    if (Number(state.mode) === 3) renderSkyGpsWidgets();
  }

  const now = Date.now();
  const sendChanged = (gpsReadyLastSent !== ready);
  const stale = (now - gpsReadyLastPushMs) > 12000;
  if (!force && !sendChanged && !stale) return;
  if (gpsReadyPushInFlight) return;

  gpsReadyPushInFlight = true;
  const ok = await apiPostOk('/api/gps/status', {ready: !!ready});
  gpsReadyPushInFlight = false;
  if (!ok) return;
  gpsReadyLastSent = ready;
  gpsReadyLastPushMs = now;
}
function gpsEffectiveEnabled() {
  return gpsToggleEnabled && gpsSecureAvailable();
}

function setGpsToggle(enabled) {
  const caps = gpsCaps();
  if (enabled && !gpsSecureAvailable(caps)) {
    stopGpsWatcher();
    lastBrowserPosition = null;
    scheduleSharedMapSync(false);
    gpsToggleEnabled = false;
    saveGpsToggleEnabled();
    state.gpsTagging = false;
    api('/api/settings', {gpsTagging:false});
    syncGpsClientStatus(true);
    if (!caps.supported) toast('GPS unavailable in this browser');
    else if (caps.iphone && !caps.secure) toast('iPhone GPS requires HTTPS');
    else toast('GPS requires HTTPS');
    renderGpsStatus();
    renderGpsToggleBlock();
    if (Number(state.mode) === 1) renderDevList();
    if (Number(state.mode) === 1) renderFlockMapPanel();
    if (Number(state.mode) === 3) renderSkyGpsWidgets();
    return;
  }
  gpsToggleEnabled = !!enabled;
  saveGpsToggleEnabled();
  state.gpsTagging = gpsToggleEnabled;
  if (gpsToggleEnabled) startGpsWatcher();
  else {
    stopGpsWatcher();
    lastBrowserPosition = null;
    scheduleSharedMapSync(false);
  }
  api('/api/settings', {gpsTagging:gpsToggleEnabled});
  syncGpsClientStatus(true);
  renderGpsStatus();
  renderGpsToggleBlock();
  if (Number(state.mode) === 1) renderDevList();
  if (Number(state.mode) === 1) renderFlockMapPanel();
  if (Number(state.mode) === 3) renderSkyGpsWidgets();
}

function toggleGpsFeature() {
  setGpsToggle(!gpsToggleEnabled);
}

function renderGpsToggleBlock() {
  const block = $('#fGpsBlock');
  const stateEl = $('#fGpsState');
  const labelEl = $('#fGpsLabel');
  const btn = $('#fGpsToggleBtn');
  const caps = gpsCaps();
  const allowed = gpsSecureAvailable(caps);
  const activeFromDevice = (typeof state.gpsTagActive === 'boolean') ? !!state.gpsTagActive : (gpsToggleEnabled && gpsClientReady && allowed);
  const on = gpsToggleEnabled && allowed && activeFromDevice;

  if (block) block.className = 'stat gps ' + (on ? 'on' : 'off');
  if (stateEl) stateEl.textContent = on ? 'ON' : 'OFF';

  if (labelEl) {
    if (!allowed && caps.iphone && !caps.secure) labelEl.textContent = 'GPS (HTTPS only)';
    else if (!allowed) labelEl.textContent = 'GPS (Unavailable)';
    else labelEl.textContent = 'GPS';
  }

  if (btn) {
    btn.textContent = on ? 'GPS On' : 'GPS Off';
    btn.style.borderColor = on ? 'var(--green)' : 'var(--rose)';
    btn.style.color = on ? 'var(--green)' : 'var(--rose)';
    btn.disabled = !allowed;
    btn.title = !allowed
      ? (caps.iphone && !caps.secure ? 'iPhone GPS requires HTTPS.' : 'GPS needs secure HTTPS context.')
      : '';
  }
}

function renderSkyGpsWidgets() {
  const block = $('#sGpsBlock');
  const stateEl = $('#sGpsState');
  const labelEl = $('#sGpsLabel');
  const statusEl = $('#sGpsStatus');
  const btn = $('#sGpsToggleBtn');
  const caps = gpsCaps();
  const allowed = gpsSecureAvailable(caps);
  const activeFromDevice = (typeof state.gpsTagActive === 'boolean')
    ? !!state.gpsTagActive
    : (gpsToggleEnabled && gpsClientReady && allowed);
  const on = gpsToggleEnabled && allowed && activeFromDevice;

  if (block) block.className = 'stat gps ' + (on ? 'on' : 'off');
  if (stateEl) stateEl.textContent = on ? 'ON' : 'OFF';

  if (labelEl) {
    if (!allowed && caps.iphone && !caps.secure) labelEl.textContent = 'GPS (HTTPS)';
    else if (!allowed) labelEl.textContent = 'GPS (N/A)';
    else labelEl.textContent = 'GPS';
  }

  if (statusEl) {
    if (!caps.supported) {
      statusEl.innerHTML = '<span class="gps-chip bad">GPS unavailable</span> Browser geolocation is unavailable for Sky Spy.';
    } else if (!gpsToggleEnabled && caps.secure) {
      statusEl.innerHTML = '<span class="gps-chip bad">GPS off</span> Enable GPS to annotate drone tracking with location context.';
    } else if (!caps.secure) {
      statusEl.innerHTML = caps.iphone
        ? '<span class="gps-chip bad">GPS off</span> iPhone on HTTP cannot use geolocation. Use https://192.168.4.1.'
        : '<span class="gps-chip bad">HTTPS required</span> Sky Spy GPS needs secure context.';
    } else if (!gpsClientReady) {
      statusEl.innerHTML = '<span class="gps-chip bad">GPS waiting</span> Waiting for browser location permission.';
    } else {
      statusEl.innerHTML = '<span class="gps-chip">GPS ready</span> Device can receive Sky Spy GPS context from this browser.';
    }
  }

  if (btn) {
    btn.textContent = on ? 'GPS On' : 'GPS Off';
    btn.style.borderColor = on ? 'var(--green)' : 'var(--rose)';
    btn.style.color = on ? 'var(--green)' : 'var(--rose)';
    btn.disabled = !allowed;
    btn.title = !allowed
      ? (caps.iphone && !caps.secure ? 'iPhone GPS requires HTTPS.' : 'GPS needs secure HTTPS context.')
      : '';
  }
}

function locKey(mac) {
  return String(mac || '').toUpperCase();
}

function getStoredLocation(mac) {
  return cameraLocations[locKey(mac)] || null;
}

function formatCoord(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n.toFixed(6) : '?';
}

function formatLocAge(ts) {
  const ageSec = Math.max(0, Math.floor((Date.now() - Number(ts || 0)) / 1000));
  if (ageSec < 60) return ageSec + 's ago';
  const min = Math.floor(ageSec / 60);
  if (min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  return hr + 'h ' + (min % 60) + 'm ago';
}

function normalizePinKind(kind, mode) {
  if (kind === 'fox' || kind === 'drone' || kind === 'flock') return kind;
  return mode === 'drone' ? 'drone' : 'flock';
}

function clampNum(v, lo, hi) {
  const n = Number(v);
  if (!Number.isFinite(n)) return lo;
  return Math.max(lo, Math.min(hi, n));
}

function rssiWeight(rssi) {
  const norm = clampNum((Number(rssi) + 95) / 50, 0, 1);
  return 0.35 + (norm * 1.65);
}

function assumedRadiusFromRssi(rssi, mode) {
  const norm = clampNum((Number(rssi) + 95) / 50, 0, 1);
  if (mode === 'drone') return 55 + ((1 - norm) * 245);
  return 6 + ((1 - norm) * 64);
}

function approxDistanceM(aLat, aLon, bLat, bLon) {
  const dLat = (Number(bLat) - Number(aLat)) * Math.PI / 180;
  const dLon = (Number(bLon) - Number(aLon)) * Math.PI / 180;
  const mean = ((Number(aLat) + Number(bLat)) * 0.5) * Math.PI / 180;
  const x = dLon * Math.cos(mean);
  const y = dLat;
  return Math.sqrt((x * x) + (y * y)) * 6371000;
}

function mapHrefForLocation(loc) {
  if (!loc) return '#';
  return 'https://maps.apple.com/?ll=' + encodeURIComponent(loc.lat + ',' + loc.lon);
}

function preserveScrollState(host) {
  if (!host) return null;
  const list = host.querySelector('.log-list');
  if (!list) return null;
  const maxScrollTop = Math.max(0, list.scrollHeight - list.clientHeight);
  return {
    scrollTop: list.scrollTop,
    maxScrollTop,
    stickToBottom: maxScrollTop > 0 && (maxScrollTop - list.scrollTop) <= 24
  };
}

function restoreScrollState(host, snapshot) {
  if (!host || !snapshot) return;
  const list = host.querySelector('.log-list');
  if (!list) return;
  const nextMaxScrollTop = Math.max(0, list.scrollHeight - list.clientHeight);
  if (snapshot.stickToBottom) {
    list.scrollTop = nextMaxScrollTop;
    return;
  }
  if (snapshot.maxScrollTop <= 0) {
    list.scrollTop = snapshot.scrollTop;
    return;
  }
  const ratio = snapshot.scrollTop / snapshot.maxScrollTop;
  list.scrollTop = Math.round(ratio * nextMaxScrollTop);
}

function renderLogEntries(host, entries, emptyMessage) {
  if (!host) return;
  const scrollState = preserveScrollState(host);
  if (!entries.length) {
    host.innerHTML = `<div class="empty"><div class="icon">&#128450;</div>${emptyMessage}</div>`;
    return;
  }
  host.innerHTML = `<div class="log-list">${entries.map(entry => `
    <div class="log-entry">
      <div class="log-entry-top">
        <div class="log-entry-meta">
          <span class="log-source ${htmlEsc(entry.source)}">${htmlEsc(entry.source)}</span>
          <span class="log-kind">${htmlEsc(entry.kind)}</span>
        </div>
        <span class="log-time">${logBootStamp(entry.ts)} · ${logAgeLabel(entry.ts)}</span>
      </div>
      <div class="log-msg">${htmlEsc(entry.message)}</div>
    </div>`).join('')}</div>`;
  restoreScrollState(host, scrollState);
}

function renderGpsStatus() {
  const caps = gpsCaps();
  const el = $('#gpsStatus');
  if (!el) return;
  if (!caps.supported) {
    el.innerHTML = '<span class="gps-chip bad">GPS unavailable</span> Browser does not expose geolocation here. Use manual coordinates.';
    return;
  }
  if (!gpsToggleEnabled && caps.secure) {
    el.innerHTML = '<span class="gps-chip bad">GPS off</span> Enable GPS to allow location capture for camera pinning.';
    return;
  }
  if (!caps.secure) {
    if (caps.iphone) {
      el.innerHTML = '<span class="gps-chip bad">GPS off</span> iPhone Safari on HTTP cannot use geolocation. Open https://192.168.4.1 to enable GPS.';
    } else {
      el.innerHTML = '<span class="gps-chip bad">HTTPS required</span> Geolocation needs a secure context. Use https://192.168.4.1 or manual coordinates.';
    }
    return;
  }
  if (!gpsClientReady) {
    el.innerHTML = '<span class="gps-chip bad">GPS waiting</span> Waiting for location access. If prompted, tap Allow to share GPS with the device.';
    return;
  }
  el.innerHTML = '<span class="gps-chip">GPS ready</span> Phone is connected and allowed to transmit GPS to the device.';
}

function saveCameraLocation(mac, lat, lon, source, rssi, mode, kind) {
  const key = locKey(mac);
  const prev = cameraLocations[key] || null;
  const sampleLat = Number(lat);
  const sampleLon = Number(lon);
  const now = Date.now();
  const m = (mode === 'drone') ? 'drone' : 'flock';
  const pinKind = normalizePinKind(kind || (prev && prev.kind), m);
  const rss = Number.isFinite(Number(rssi)) ? Number(rssi) : -85;

  if (!prev || !Number.isFinite(prev.lat) || !Number.isFinite(prev.lon)) {
    cameraLocations[key] = {
      lat: sampleLat,
      lon: sampleLon,
      source: source || 'gps',
      mode: m,
      kind: pinKind,
      label: prev && prev.label ? String(prev.label) : '',
      ts: now,
      samples: 1,
      weight: rssiWeight(rss),
      radiusM: assumedRadiusFromRssi(rss, m)
    };
    saveCameraLocations();
    return;
  }

  let nextLat = sampleLat;
  let nextLon = sampleLon;
  let nextWeight = Number(prev.weight || 1);
  let nextRadius = Number(prev.radiusM || assumedRadiusFromRssi(rss, m));

  if (m === 'drone') {
    const alpha = clampNum(0.62 + (rssiWeight(rss) * 0.16), 0.62, 0.90);
    nextLat = (Number(prev.lat) * (1 - alpha)) + (sampleLat * alpha);
    nextLon = (Number(prev.lon) * (1 - alpha)) + (sampleLon * alpha);
    const drift = approxDistanceM(prev.lat, prev.lon, sampleLat, sampleLon);
    const instant = assumedRadiusFromRssi(rss, 'drone') + (drift * 0.90);
    nextRadius = clampNum((nextRadius * 0.72) + (instant * 0.28), 40, 500);
  } else {
    const w = rssiWeight(rss);
    const total = nextWeight + w;
    nextLat = ((Number(prev.lat) * nextWeight) + (sampleLat * w)) / total;
    nextLon = ((Number(prev.lon) * nextWeight) + (sampleLon * w)) / total;
    nextWeight = total;
    const drift = approxDistanceM(prev.lat, prev.lon, sampleLat, sampleLon);
    const instant = assumedRadiusFromRssi(rss, 'flock') + (drift * 0.42);
    nextRadius = clampNum((nextRadius * 0.78) + (instant * 0.22), 6, 110);
  }

  cameraLocations[key] = {
    lat: nextLat,
    lon: nextLon,
    source: source || prev.source || 'gps',
    mode: m,
    kind: pinKind,
    label: prev.label || '',
    ts: now,
    samples: Number(prev.samples || 1) + 1,
    weight: nextWeight,
    radiusM: nextRadius
  };
  saveCameraLocations();
}

function syncPinToRegistry(mac) {
  const loc = getStoredLocation(mac);
  if (!loc || !Number.isFinite(loc.lat) || !Number.isFinite(loc.lon)) return;
  const regIdx = (foxRegistry || []).findIndex(r => locKey(r.mac) === locKey(mac));
  if (regIdx < 0) return;
  api('/api/fox/registry/update', {
    mac: mac,
    lat: loc.lat,
    lon: loc.lon,
    radiusM: loc.radiusM || 30
  });
}

function promptManualLocation(mac, options) {
  const current = getStoredLocation(mac);
  const lat = prompt('Latitude (example 37.774900):', current ? String(current.lat) : '');
  if (lat === null) return false;
  const lon = prompt('Longitude (example -122.419400):', current ? String(current.lon) : '');
  if (lon === null) return false;
  const latN = Number(lat), lonN = Number(lon);
  if (!Number.isFinite(latN) || !Number.isFinite(lonN) || latN < -90 || latN > 90 || lonN < -180 || lonN > 180) {
    toast('Invalid coordinates');
    return false;
  }
  const mode = options && options.mode === 'drone' ? 'drone' : 'flock';
  const rssi = options && Number.isFinite(Number(options.rssi)) ? Number(options.rssi) : -85;
  const kind = options && options.kind ? options.kind : null;
  saveCameraLocation(mac, latN, lonN, 'manual', rssi, mode, kind);
  syncPinToRegistry(mac);
  return true;
}

function getCurrentPosition() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(pos => {
      lastBrowserPosition = {
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        ts: Date.now()
      };
      scheduleSharedMapSync(false);
      resolve(pos);
    }, reject, {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 2000
    });
  });
}

async function markCameraLocation(mac) {
  return markDeviceLocation(mac, { mode: 'flock', rerender: 'flock' });
}

async function markDeviceLocation(mac, options) {
  if (!gpsEffectiveEnabled()) {
    toast('GPS is off or unavailable');
    return false;
  }
  const caps = gpsCaps();
  if (!caps.supported || !caps.secure) {
    toast('GPS unavailable in current context');
    return false;
  }
  const mode = options && options.mode === 'drone' ? 'drone' : 'flock';
  const rssi = options && Number.isFinite(Number(options.rssi)) ? Number(options.rssi) : -85;
  const kind = options && options.kind ? options.kind : null;
  const rerender = options && options.rerender;
  try {
    const pos = await getCurrentPosition();
    saveCameraLocation(mac, pos.coords.latitude, pos.coords.longitude, 'gps', rssi, mode, kind);
    syncPinToRegistry(mac);
    toast('GPS location saved');
    if (rerender === 'fox' || Number(state.mode) === 2) renderFoxInner();
    else if (rerender === 'sky' || Number(state.mode) === 3) renderDroneCards();
    else if (Number(state.mode) === 1) renderDevList();
    return true;
  } catch (e) {
    if (promptManualLocation(mac, { mode, kind, rssi })) {
      toast('GPS blocked; saved manual location');
      if (rerender === 'fox' || Number(state.mode) === 2) renderFoxInner();
      else if (rerender === 'sky' || Number(state.mode) === 3) renderDroneCards();
      else if (Number(state.mode) === 1) renderDevList();
      return true;
    } else {
      toast('GPS blocked/unavailable; use manual entry');
      return false;
    }
  }
}

function setCameraLocationLabel(mac, label) {
  const key = locKey(mac);
  if (!cameraLocations[key]) return false;
  cameraLocations[key].label = String(label || '').trim();
  saveCameraLocations();
  return true;
}

function clearCameraLocation(mac) {
  delete cameraLocations[locKey(mac)];
  saveCameraLocations();
  const regIdx = (foxRegistry || []).findIndex(r => locKey(r.mac) === locKey(mac));
  if (regIdx >= 0) {
    api('/api/fox/registry/update', { mac: mac, clearPin: true });
  }
  if (Number(state.mode) === 2) renderFoxInner();
  else if (Number(state.mode) === 3) renderDroneCards();
  else if (Number(state.mode) === 1) renderDevList();
}

function hideHoldConfirm() {
  if (confirmHoldTimer) clearTimeout(confirmHoldTimer);
  if (confirmHoldInterval) clearInterval(confirmHoldInterval);
  confirmHoldTimer = null;
  confirmHoldInterval = null;
  confirmAction = null;
  confirmHoldStartedMs = 0;
  const overlay = $('#confirmOverlay');
  const fill = $('#confirmHoldFill');
  const label = $('#confirmHoldLabel');
  if (overlay) overlay.classList.remove('show');
  if (fill) fill.style.width = '0%';
  if (label) label.textContent = 'Hold 3s to confirm';
}

function handleConfirmOverlayClick(event) {
  if (event.target && event.target.id === 'confirmOverlay') hideHoldConfirm();
}

function updateHoldConfirmProgress() {
  const fill = $('#confirmHoldFill');
  const label = $('#confirmHoldLabel');
  const elapsed = Math.max(0, Date.now() - confirmHoldStartedMs);
  const pct = Math.max(0, Math.min(100, (elapsed / 3000) * 100));
  if (fill) fill.style.width = pct + '%';
  if (label) label.textContent = pct >= 100 ? 'Confirmed' : `Hold ${Math.max(0, Math.ceil((3000 - elapsed) / 1000))}s to confirm`;
}

function beginHoldConfirm(event) {
  if (event && event.preventDefault) event.preventDefault();
  if (!confirmAction || confirmHoldTimer) return;
  confirmHoldStartedMs = Date.now();
  updateHoldConfirmProgress();
  confirmHoldInterval = setInterval(updateHoldConfirmProgress, 80);
  confirmHoldTimer = setTimeout(async () => {
    const action = confirmAction;
    hideHoldConfirm();
    if (typeof action === 'function') await action();
  }, 3000);
}

function cancelHoldConfirmPress() {
  if (!confirmHoldTimer) return;
  clearTimeout(confirmHoldTimer);
  clearInterval(confirmHoldInterval);
  confirmHoldTimer = null;
  confirmHoldInterval = null;
  const fill = $('#confirmHoldFill');
  const label = $('#confirmHoldLabel');
  if (fill) fill.style.width = '0%';
  if (label) label.textContent = 'Hold 3s to confirm';
}

function showHoldConfirm(message, action, title) {
  confirmAction = action;
  const overlay = $('#confirmOverlay');
  const titleEl = $('#confirmTitle');
  const msgEl = $('#confirmMessage');
  if (titleEl) titleEl.textContent = title || 'Confirm Delete';
  if (msgEl) msgEl.textContent = message || 'Are you sure you want to delete this?';
  if (overlay) overlay.classList.add('show');
}

function requestClearCameraLocation(mac, afterDelete) {
  showHoldConfirm('Are you sure you want to delete this?', () => {
    clearCameraLocation(mac);
    if (typeof afterDelete === 'function') afterDelete();
    toast('Pinned device deleted');
  }, 'Delete Pinned Device');
}

function gpsMapEligible() {
  return Object.keys(cameraLocations || {}).length > 0
    || !!lastBrowserPosition
    || !!flockMapTileDir
    || flockMapDeviceTilesAvailable === true
    || gpsEffectiveEnabled();
}

function handleFlockMapTap() {
  const now = Date.now();
  if ((now - flockMapLastTapMs) > 800) flockMapTapCount = 0;
  flockMapTapCount++;
  flockMapLastTapMs = now;
  if (flockMapTapCount >= 3) {
    flockMapTapCount = 0;
    toggleFlockMap();
  }
}

function mapDeviceRecordForMac(mac) {
  const key = String(mac || '').toUpperCase();
  const device = (devices || []).find(d => String(d.mac || '').toUpperCase() === key);
  const drone = (drones || []).find(d => String(d.mac || '').toUpperCase() === key);
  const registry = (foxRegistry || []).find(r => String(r.mac || '').toUpperCase() === key);
  return { device, drone, registry };
}

function pinDisplayName(mac, loc) {
  if (loc && loc.label) return String(loc.label);
  const match = mapDeviceRecordForMac(mac);
  if (match.drone) return match.drone.id || 'Drone';
  if (match.device) return match.device.name || (match.device.raven ? 'Raven Sensor' : 'Flock device');
  if (match.registry) return regDisplayName(match.registry);
  if (state.fox && String(state.fox.target || '').toUpperCase() === String(mac || '').toUpperCase()) return 'Fox target';
  return String(mac || 'Pinned device');
}

function pinKindForEntry(mac, loc) {
  if (loc && loc.kind) return normalizePinKind(loc.kind, loc.mode);
  const match = mapDeviceRecordForMac(mac);
  if (match.drone || (match.registry && normRegSection(match.registry.section) === 'drone')) return 'drone';
  if (match.registry && ['wifi', 'ble', 'known'].includes(normRegSection(match.registry.section))) return 'fox';
  if (state.fox && String(state.fox.target || '').toUpperCase() === String(mac || '').toUpperCase()) return 'fox';
  return 'flock';
}

function flockMapPins() {
  return Object.keys(cameraLocations || {}).map(mac => {
    const loc = getStoredLocation(mac);
    if (!loc) return null;
    const match = mapDeviceRecordForMac(mac);
    const kind = pinKindForEntry(mac, loc);
    const mode = loc.mode === 'drone' ? 'drone' : 'flock';
    const defaultRssi = match.drone ? Number(match.drone.rssi || -100) : match.device ? Number(match.device.rssi || -100) : -85;
    return {
      mac,
      name: pinDisplayName(mac, loc),
      lat: Number(loc.lat),
      lon: Number(loc.lon),
      kind,
      radiusM: clampNum(loc.radiusM || assumedRadiusFromRssi(defaultRssi, mode), mode === 'drone' ? 40 : 6, mode === 'drone' ? 500 : 110),
      source: loc.source || 'manual',
      rssi: defaultRssi,
      age: formatLocAge(loc.ts)
    };
  }).filter(pin => pin && Number.isFinite(pin.lat) && Number.isFinite(pin.lon));
}

function mapZoomList(values) {
  return Array.from(new Set((values || [])
    .map(value => Number(value))
    .filter(value => Number.isInteger(value) && value >= 0 && value <= 22)))
    .sort((a, b) => a - b);
}

function nearestMapZoom(zooms, target) {
  if (!zooms.length) return 14;
  return zooms.reduce((best, zoom) => {
    if (!Number.isFinite(best)) return zoom;
    return Math.abs(zoom - target) < Math.abs(best - target) ? zoom : best;
  }, Number.NaN);
}

function flockMapSupportedZooms() {
  const localZooms = mapZoomList(flockMapLocalAvailableZooms);
  if (localZooms.length) return localZooms;

  const deviceZooms = mapZoomList(flockMapDeviceAvailableZooms);
  if (deviceZooms.length) return deviceZooms;

  const fallbackZooms = [];
  if (flockMapDeviceFallbackCenter && Number.isFinite(flockMapDeviceFallbackCenter.zoom)) {
    fallbackZooms.push(Math.round(flockMapDeviceFallbackCenter.zoom));
  }
  if (typeof flockMapDeviceMaxZoom === 'number' && flockMapDeviceMaxZoom >= 0) fallbackZooms.push(flockMapDeviceMaxZoom);
  return mapZoomList(fallbackZooms);
}

function flockMapRequestedZoom() {
  const zooms = flockMapSupportedZooms();
  if (!zooms.length) return 14;
  if (!zooms.includes(flockMapZoomLevel)) {
    flockMapZoomLevel = nearestMapZoom(zooms, flockMapZoomLevel);
  }
  return flockMapZoomLevel;
}

function flockMapResolvedZoom() {
  const requestedZoom = flockMapRequestedZoom();
  if (mapZoomList(flockMapLocalAvailableZooms).length) return requestedZoom;
  if (flockMapTileDir) return requestedZoom;
  if (typeof flockMapDeviceMaxZoom === 'number' && flockMapDeviceMaxZoom >= 0 && requestedZoom > flockMapDeviceMaxZoom) {
    return flockMapDeviceMaxZoom;
  }
  return requestedZoom;
}

function flockMapDebugEnabled() {
  return !!(state.advancedLoggingEnabled || state.webDiagnosticsEnabled || state.advancedSerialLoggingEnabled);
}

function flockMapPushTileAttempt(entry) {
  flockMapTileAttempts.unshift(Object.assign({ ts: Date.now() }, entry || {}));
  if (flockMapTileAttempts.length > 18) flockMapTileAttempts.length = 18;
}

function flockMapDescribeTileSource(source) {
  if (source === 'local-map-subdir') return 'browser folder /map';
  if (source === 'local-folder') return 'browser folder';
  if (source === 'device') return 'device';
  return source || 'unknown';
}

function flockMapAttemptAgeLabel(tsMs) {
  const ageSec = Math.max(0, Math.floor((Date.now() - Number(tsMs || 0)) / 1000));
  if (ageSec < 2) return 'just now';
  if (ageSec < 60) return `${ageSec}s ago`;
  const minutes = Math.floor(ageSec / 60);
  if (minutes < 60) return `${minutes}m ${ageSec % 60}s ago`;
  const hours = Math.floor(minutes / 60);
  return `${hours}h ${minutes % 60}m ago`;
}

function flockMapDebugLine(label, value) {
  return `<div class="map-debug-line"><strong>${htmlEsc(label)}:</strong> ${htmlEsc(value)}</div>`;
}

function renderFlockMapDebugPanel() {
  const el = $('#flockMapDebugPanel');
  if (!el) return;

  const lines = [];
  if (flockMapRenderDebug) {
    const render = flockMapRenderDebug;
    lines.push(flockMapDebugLine('Center', `${Number(render.center.lat || 0).toFixed(6)}, ${Number(render.center.lon || 0).toFixed(6)}`));
    lines.push(flockMapDebugLine('Zoom', `${render.resolvedZoom}${render.resolvedZoom !== render.requestedZoom ? ` (requested ${render.requestedZoom})` : ''}`));
    lines.push(flockMapDebugLine('Pins', `${render.pinStats.visible}/${render.pinStats.total} visible, ${render.pinStats.clipped} clipped, ${render.pinStats.invalid} invalid`));
    lines.push(flockMapDebugLine('Tiles', `${render.tileStats.loaded}/${render.tileStats.attempted} loaded, ${render.tileStats.misses} misses, local ${render.tileStats.localHits}, device ${render.tileStats.deviceHits}`));
    lines.push(flockMapDebugLine('Viewport', `x ${render.tileStats.startTileX}..${render.tileStats.endTileX}, y ${render.tileStats.startTileY}..${render.tileStats.endTileY}, ${render.tileStats.skippedY} y-skipped`));
    lines.push(flockMapDebugLine('Sources', `browser zooms [${(render.localZooms || []).join(', ') || 'none'}], device zooms [${(render.deviceZooms || []).join(', ') || 'none'}]`));
    lines.push(flockMapDebugLine('Fallback', render.fallback || 'none'));
  }

  if (flockMapDeviceDebug) {
    const all = flockMapDeviceDebug.all || {};
    const lcd = flockMapDeviceDebug.lcd || {};
    lines.push(flockMapDebugLine('Device cache', `${flockMapDeviceDebug.rootAvailable ? (flockMapDeviceDebug.mapRoot || '/sdcard/map') : 'root missing'}, age ${Number(flockMapDeviceDebug.cacheAgeMs || 0)} ms`));
    lines.push(flockMapDebugLine('Device all', `${all.available ? `z${all.highestZoom} [${((all.zooms || []).join(', ')) || 'none'}], tile ${((all.representativeTile || {}).x ?? 0)}/${((all.representativeTile || {}).y ?? 0)}` : 'unavailable'}`));
    lines.push(flockMapDebugLine('Device LCD', `${lcd.available ? `z${lcd.highestZoom} [${((lcd.zooms || []).join(', ')) || 'none'}], tile ${((lcd.representativeTile || {}).x ?? 0)}/${((lcd.representativeTile || {}).y ?? 0)}` : 'unavailable'}`));
  }

  const attempts = flockMapTileAttempts.length
    ? flockMapTileAttempts.map(entry => `<div class="map-debug-line">${htmlEsc(flockMapAttemptAgeLabel(entry.ts))} · ${htmlEsc(flockMapDescribeTileSource(entry.source))} · z${htmlEsc(String(entry.z))}/${htmlEsc(String(entry.x))}/${htmlEsc(String(entry.y))} · ${htmlEsc(entry.result || 'unknown')}${entry.detail ? ` · ${htmlEsc(entry.detail)}` : ''}</div>`).join('')
    : '<div class="map-debug-line">No tile fetches recorded yet.</div>';

  el.innerHTML = `
    <div class="map-debug-grid">
      ${lines.length ? lines.join('') : '<div class="map-debug-line">Waiting for map diagnostics.</div>'}
    </div>
    <div class="map-debug-list">${attempts}</div>`;
}

async function scanTileZoomLevels(rootHandle) {
  if (!rootHandle || typeof rootHandle.values !== 'function') return [];
  const zooms = [];
  try {
    for await (const entry of rootHandle.values()) {
      if (!entry || entry.kind !== 'directory') continue;
      if (!/^\d+$/.test(entry.name || '')) continue;
      zooms.push(Number(entry.name));
    }
  } catch (e) {}
  return mapZoomList(zooms);
}

async function refreshLocalMapTileStatus() {
  if (!flockMapTileDir) {
    flockMapLocalAvailableZooms = null;
    return [];
  }

  let zooms = await scanTileZoomLevels(flockMapTileDir);
  if (!zooms.length) {
    try {
      const nestedMapDir = await flockMapTileDir.getDirectoryHandle('map');
      zooms = await scanTileZoomLevels(nestedMapDir);
    } catch (e) {}
  }

  flockMapLocalAvailableZooms = zooms;
  return zooms;
}

function flockMapCenter(pins) {
  if (pins.length) {
    const lat = pins.reduce((sum, pin) => sum + pin.lat, 0) / pins.length;
    const lon = pins.reduce((sum, pin) => sum + pin.lon, 0) / pins.length;
    return { lat, lon };
  }
  if (flockMapDeviceFallbackCenter
      && Number.isFinite(flockMapDeviceFallbackCenter.lat)
      && Number.isFinite(flockMapDeviceFallbackCenter.lon)) {
    return { lat: flockMapDeviceFallbackCenter.lat, lon: flockMapDeviceFallbackCenter.lon };
  }
  if (lastBrowserPosition && Number.isFinite(lastBrowserPosition.lat) && Number.isFinite(lastBrowserPosition.lon)) {
    return { lat: lastBrowserPosition.lat, lon: lastBrowserPosition.lon };
  }
  return { lat: 0, lon: 0 };
}

function latLonToWorld(lat, lon, zoom) {
  const scale = 256 * Math.pow(2, zoom);
  const sin = Math.sin((lat * Math.PI) / 180);
  return {
    x: ((lon + 180) / 360) * scale,
    y: (0.5 - Math.log((1 + sin) / (1 - sin)) / (4 * Math.PI)) * scale
  };
}

function wrapTileX(x, zoom) {
  const count = Math.pow(2, zoom);
  return ((x % count) + count) % count;
}

async function loadLocalTileBitmap(z, x, y) {
  if (!flockMapTileDir || !window.showDirectoryPicker) return null;

  const tryLoadFromRoot = async (rootHandle) => {
    if (!rootHandle) return null;
    try {
      const zDir = await rootHandle.getDirectoryHandle(String(z));
      const xDir = await zDir.getDirectoryHandle(String(x));
      for (const ext of ['png', 'jpg', 'jpeg', 'webp']) {
        try {
          const fileHandle = await xDir.getFileHandle(`${y}.${ext}`);
          const file = await fileHandle.getFile();
          return { bitmap: await createImageBitmap(file), ext };
        } catch (e) {}
      }
    } catch (e) {}
    return null;
  };

  let bitmap = await tryLoadFromRoot(flockMapTileDir);
  if (bitmap) {
    flockMapPushTileAttempt({ source: 'local-folder', z, x, y, result: 'hit', detail: bitmap.ext });
    return bitmap;
  }

  try {
    const nestedMapDir = await flockMapTileDir.getDirectoryHandle('map');
    bitmap = await tryLoadFromRoot(nestedMapDir);
    if (bitmap) {
      flockMapPushTileAttempt({ source: 'local-map-subdir', z, x, y, result: 'hit', detail: bitmap.ext });
      return bitmap;
    }
  } catch (e) {}
  flockMapPushTileAttempt({ source: 'local-folder', z, x, y, result: 'miss' });
  return null;
}

async function loadDeviceTileBitmap(z, x, y) {
  if (!Number.isFinite(z) || !Number.isFinite(x) || !Number.isFinite(y)) return null;
  if (z < 0 || x < 0 || y < 0) return null;
  try {
    const resp = await fetch(`/api/map/tile?z=${encodeURIComponent(z)}&x=${encodeURIComponent(x)}&y=${encodeURIComponent(y)}`, { cache: 'force-cache' });
    if (!resp.ok) {
      flockMapPushTileAttempt({ source: 'device', z, x, y, result: 'miss', detail: `HTTP ${resp.status}` });
      return null;
    }
    const blob = await resp.blob();
    const contentType = blob.type || resp.headers.get('content-type') || 'tile';
    flockMapPushTileAttempt({ source: 'device', z, x, y, result: 'hit', detail: contentType });
    return { bitmap: await createImageBitmap(blob), ext: contentType };
  } catch (e) {
    flockMapPushTileAttempt({ source: 'device', z, x, y, result: 'error', detail: e && e.message ? e.message : 'fetch failed' });
  }
  return null;
}

async function refreshDeviceMapTileStatus() {
  const status = await api('/api/map/status');
  flockMapDeviceTilesAvailable = !!(status && status.available);
  flockMapDeviceMaxZoom = (status && Number.isFinite(status.maxZoom)) ? status.maxZoom : null;
  flockMapDeviceAvailableZooms = mapZoomList(status && Array.isArray(status.availableZooms) ? status.availableZooms : []);
  flockMapDeviceLcdTilesAvailable = !!(status && status.lcdAvailable);
  flockMapDeviceLcdMaxZoom = (status && Number.isFinite(status.lcdMaxZoom)) ? status.lcdMaxZoom : null;
  flockMapDeviceLcdAvailableZooms = mapZoomList(status && Array.isArray(status.lcdAvailableZooms) ? status.lcdAvailableZooms : []);
  flockMapDeviceDebug = status && status.debug ? status.debug : null;
  flockMapDeviceFallbackCenter = (status && status.fallbackAvailable && Number.isFinite(status.fallbackLat) && Number.isFinite(status.fallbackLon))
    ? { lat: Number(status.fallbackLat), lon: Number(status.fallbackLon), zoom: Number(status.fallbackZoom) }
    : null;
  if (gpsMapEligible()) {
    renderFlockMapPanel();
    if (flockMapVisible) void drawFlockMap();
  }
  return flockMapDeviceTilesAvailable;
}

function drawFlockMapGrid(ctx, width, height) {
  ctx.fillStyle = '#15181c';
  ctx.fillRect(0, 0, width, height);
  ctx.strokeStyle = 'rgba(148,163,184,0.18)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= width; x += 32) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, height);
    ctx.stroke();
  }
  for (let y = 0; y <= height; y += 32) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(width, y);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(203,213,225,0.26)';
  ctx.strokeRect(0.5, 0.5, width - 1, height - 1);
}

async function drawFlockMapTiles(ctx, canvas, center, zoom, token) {
  const stats = {
    drewAny: false,
    attempted: 0,
    loaded: 0,
    localHits: 0,
    deviceHits: 0,
    misses: 0,
    skippedY: 0,
    startTileX: 0,
    endTileX: 0,
    startTileY: 0,
    endTileY: 0
  };
  if (!Number.isFinite(zoom) || zoom < 0 || zoom > 22) return stats;
  if (!flockMapTileDir && flockMapDeviceTilesAvailable !== true) return stats;
  const centerWorld = latLonToWorld(center.lat, center.lon, zoom);
  const startX = centerWorld.x - canvas.width / 2;
  const startY = centerWorld.y - canvas.height / 2;
  const startTileX = Math.floor(startX / 256);
  const endTileX = Math.floor((centerWorld.x + canvas.width / 2) / 256);
  const startTileY = Math.floor(startY / 256);
  const endTileY = Math.floor((centerWorld.y + canvas.height / 2) / 256);
  stats.startTileX = startTileX;
  stats.endTileX = endTileX;
  stats.startTileY = startTileY;
  stats.endTileY = endTileY;

  for (let tileY = startTileY; tileY <= endTileY; tileY++) {
    if (tileY < 0 || tileY >= Math.pow(2, zoom)) {
      stats.skippedY += 1;
      continue;
    }
    for (let tileX = startTileX; tileX <= endTileX; tileX++) {
      if (token !== flockMapDrawToken) return stats;
      stats.attempted += 1;
      const wrappedX = wrapTileX(tileX, zoom);
      let tile = await loadLocalTileBitmap(zoom, wrappedX, tileY);
      if (tile) {
        stats.localHits += 1;
      }
      if (!tile) {
        tile = await loadDeviceTileBitmap(zoom, wrappedX, tileY);
        if (tile) stats.deviceHits += 1;
      }
      if (!tile) {
        stats.misses += 1;
        continue;
      }
      const dx = Math.round((tileX * 256) - startX);
      const dy = Math.round((tileY * 256) - startY);
      ctx.drawImage(tile.bitmap, dx, dy, 256, 256);
      tile.bitmap.close();
      stats.loaded += 1;
      stats.drewAny = true;
    }
  }

  return stats;
}

function drawFlockMapPins(ctx, canvas, center, zoom, pins) {
  const centerWorld = latLonToWorld(center.lat, center.lon, zoom);
  ctx.font = '11px Segoe UI, Aptos, sans-serif';
  ctx.textBaseline = 'top';

  const metersPerPixel = (40075016.686 * Math.cos(center.lat * Math.PI / 180)) / (256 * Math.pow(2, zoom));
  const stats = {
    total: pins.length,
    visible: 0,
    clipped: 0,
    invalid: 0,
    metersPerPixel
  };

  pins.forEach(pin => {
    const point = latLonToWorld(pin.lat, pin.lon, zoom);
    const px = Math.round((point.x - centerWorld.x) + canvas.width / 2);
    const py = Math.round((point.y - centerWorld.y) + canvas.height / 2);
    if (!Number.isFinite(px) || !Number.isFinite(py)) {
      stats.invalid += 1;
      return;
    }
    if (px < -24 || px > canvas.width + 24 || py < -24 || py > canvas.height + 24) {
      stats.clipped += 1;
      return;
    }
    stats.visible += 1;

    const radiusPx = Math.max(3, Math.min(48, Number(pin.radiusM || 0) / Math.max(0.01, metersPerPixel)));
    const fillColor = pin.kind === 'self'
      ? 'rgba(34,211,238,0.14)'
      : (pin.kind === 'drone' ? 'rgba(56,189,248,0.12)' : (pin.kind === 'fox' ? 'rgba(251,146,60,0.12)' : 'rgba(248,113,113,0.12)'));
    const strokeColor = pin.kind === 'self'
      ? 'rgba(34,211,238,0.55)'
      : (pin.kind === 'drone' ? 'rgba(56,189,248,0.45)' : (pin.kind === 'fox' ? 'rgba(251,146,60,0.45)' : 'rgba(248,113,113,0.45)'));
    ctx.fillStyle = fillColor;
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(px, py, radiusPx, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = pin.kind === 'self'
      ? 'rgba(34,211,238,0.96)'
      : (pin.kind === 'drone' ? 'rgba(56,189,248,0.92)' : (pin.kind === 'fox' ? 'rgba(251,146,60,0.92)' : 'rgba(248,113,113,0.92)'));
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 2;
    ctx.stroke();

    const label = pin.kind === 'self'
      ? `${pin.name} ${pin.age || ''}`.trim()
      : `${pin.name} ${pin.rssi} dBm ±${Math.round(Number(pin.radiusM || 0))}m`;
    const width = ctx.measureText(label).width + 10;
    ctx.fillStyle = 'rgba(9,9,11,0.78)';
    ctx.fillRect(px + 8, py - 10, width, 16);
    ctx.fillStyle = '#f8fafc';
    ctx.fillText(label, px + 13, py - 8);
  });

  return stats;
}

async function drawFlockMap() {
  const canvas = $('#flockMapCanvas');
  if (!canvas || !flockMapVisible) return;

  const ctx = canvas.getContext('2d');
  const pins = flockMapRenderablePins();
  const center = flockMapCenter(pins);
  const requestedZoom = flockMapRequestedZoom();
  const zoom = flockMapResolvedZoom();
  const token = ++flockMapDrawToken;

  drawFlockMapGrid(ctx, canvas.width, canvas.height);
  const tileStats = await drawFlockMapTiles(ctx, canvas, center, zoom, token);
  if (token !== flockMapDrawToken) return;

  if (!tileStats.drewAny) {
    drawFlockMapGrid(ctx, canvas.width, canvas.height);
  }
  const pinStats = drawFlockMapPins(ctx, canvas, center, zoom, pins);
  flockMapRenderDebug = {
    center,
    requestedZoom,
    resolvedZoom: zoom,
    localZooms: mapZoomList(flockMapLocalAvailableZooms),
    deviceZooms: mapZoomList(flockMapDeviceAvailableZooms),
    pinStats,
    tileStats,
    fallback: pins.length
      ? 'pin-centroid'
      : (flockMapDeviceFallbackCenter
          ? `device fallback z${Number(flockMapDeviceFallbackCenter.zoom || zoom)}`
          : (lastBrowserPosition ? 'browser GPS' : 'origin'))
  };

  ctx.fillStyle = 'rgba(9,9,11,0.78)';
  ctx.fillRect(8, canvas.height - 24, canvas.width - 16, 16);
  ctx.fillStyle = '#d4d4d8';
  ctx.font = '11px Segoe UI, Aptos, sans-serif';
  const zoomLabel = zoom === requestedZoom ? `Zoom ${zoom}` : `Zoom ${zoom} (requested ${requestedZoom})`;
  ctx.fillText(`${zoomLabel} · ${pins.length} map points${tileStats.drewAny ? ' · offline tiles loaded' : ' · grid fallback'}`, 14, canvas.height - 21);

  if (!pins.length) {
    ctx.fillStyle = 'rgba(9,9,11,0.68)';
    ctx.fillRect(40, 46, canvas.width - 80, 42);
    ctx.fillStyle = '#e4e4e7';
    ctx.fillText(tileStats.drewAny ? 'No pinned devices yet. Showing tile fallback.' : 'No pinned devices yet.', 54, 58);
    ctx.fillStyle = '#a1a1aa';
    ctx.fillText(tileStats.drewAny ? 'Last browser GPS or a device tile area is being used as the center.' : 'Save GPS or manual pins across the applets to populate the map.', 54, 72);
  }

  renderFlockMapDebugPanel();
}

function cycleFlockMapZoom() {
  const zooms = flockMapSupportedZooms();
  if (!zooms.length) {
    flockMapZoomLevel = 14;
    renderFlockMapPanel();
    toast('Map zoom 14');
    return;
  }
  const currentZoom = flockMapRequestedZoom();
  const currentIdx = Math.max(0, zooms.indexOf(currentZoom));
  flockMapZoomLevel = zooms[(currentIdx + 1) % zooms.length] || currentZoom;
  renderFlockMapPanel();
  toast(`Map zoom ${flockMapRequestedZoom()}`);
}

function dismissFlockMapAlert() {
  flockMapAlertDismissed = true;
  renderFlockMapPanel();
}

async function loadFlockMapTiles() {
  const deviceHasTiles = await refreshDeviceMapTileStatus();
  if (deviceHasTiles) {
    flockMapTileDir = null;
    flockMapLocalAvailableZooms = null;
    flockMapAlertDismissed = false;
    renderFlockMapPanel();
    await drawFlockMap();
    toast('Using /sdcard/map tiles from the device');
    return;
  }
  if (!window.showDirectoryPicker) {
    toast('This browser cannot open local tile folders, and /sdcard/map is not available on the device');
    return;
  }
  try {
    flockMapTileDir = await window.showDirectoryPicker();
    await refreshLocalMapTileStatus();
    flockMapAlertDismissed = false;
    renderFlockMapPanel();
    await drawFlockMap();
    toast('Offline tile folder loaded');
  } catch (e) {}
}

function renderFlockMapPanel() {
  const el = $('#flockMapPanel');
  const toggleBtn = $('#flockMapToggleBtn');
  const tilesBtn = $('#flockMapTilesBtn');
  const summary = $('#flockMapSummary');
  if (!el) return;

  const eligible = gpsMapEligible();
  if (toggleBtn) {
    toggleBtn.disabled = !eligible;
    toggleBtn.textContent = flockMapVisible ? 'Hide Map' : 'Open Map';
  }
  if (tilesBtn) tilesBtn.disabled = !eligible;
  if (summary) {
    summary.textContent = eligible
      ? 'Triple-click the GPS tile or use Open Map to view pinned devices from Flock, Fox, and Sky. Tiles load from /sdcard/map when available, or from a browser-selected folder. Double-click the map to cycle zoom.'
      : 'Open the pinned-device map to review saved locations from Flock, Fox, and Sky.';
  }

  if (!eligible) {
    flockMapVisible = false;
    el.innerHTML = '<div class="empty" style="padding:14px 0"><div class="icon" style="font-size:24px">&#128506;</div>No pinned locations yet. Save a GPS or manual pin from any applet to populate the shared map.</div>';
    return;
  }

  if (!flockMapVisible) {
    el.innerHTML = `<div class="empty" style="padding:14px 0"><div class="icon" style="font-size:24px">&#128506;</div>Triple-click the GPS tile to open the map, or use Open Map above.<br><small style="color:var(--dim)">Pinned devices render on a gray grid even if offline tiles are not loaded.</small></div>`;
    return;
  }

  const showAlert = !flockMapTileDir && flockMapDeviceTilesAvailable === false && !flockMapAlertDismissed;
  const showDebug = flockMapDebugEnabled();
  const zoomBtn = $('#flockMapZoomBtn');
  if (zoomBtn) zoomBtn.textContent = `Zoom ${flockMapRequestedZoom()}`;

  const existingCanvas = $('#flockMapCanvas');
  const existingAlert = $('#flockMapAlert');
  const existingDebug = $('#flockMapDebugPanel');
  if (existingCanvas && (!!existingAlert === showAlert) && (!!existingDebug === showDebug)) {
    renderFlockMapDebugPanel();
    return;
  }

  el.innerHTML = `
    ${showAlert ? `<div id="flockMapAlert" style="margin-bottom:10px;padding:10px 12px;border:1px solid rgba(248,113,113,.45);background:rgba(127,29,29,.18);border-radius:10px;color:#fecaca;font-size:12px">
      No map tiles are currently loading from a browser folder or /sdcard/map. The map is using a gray grid fallback. <a href="https://github.com/colonelpanichacks/ouispy-c6#offline-flock-map-addon" target="_blank">README instructions</a>
      <button class="btn sm" style="margin-left:8px;border-color:var(--rose);color:var(--rose)" onclick="dismissFlockMapAlert()">Clear</button>
    </div>` : ''}
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <button class="btn sm" onclick="loadFlockMapTiles()">${flockMapTileDir ? 'Reload Tiles' : 'Load Device/Folder Tiles'}</button>
      <button class="btn sm" id="flockMapZoomBtn" onclick="cycleFlockMapZoom()">Zoom ${flockMapRequestedZoom()}</button>
    </div>
    <canvas id="flockMapCanvas" width="320" height="220" ondblclick="cycleFlockMapZoom()" style="width:100%;max-width:100%;border-radius:12px;border:1px solid var(--border);background:#15181c"></canvas>
    ${showDebug ? '<div id="flockMapDebugPanel" class="map-debug-panel"></div>' : ''}`;

  renderFlockMapDebugPanel();
  setTimeout(() => { drawFlockMap(); }, 0);
}

async function toggleFlockMap(forceOpen) {
  if (!gpsMapEligible()) {
    const deviceHasTiles = await refreshDeviceMapTileStatus();
    if (!deviceHasTiles && !gpsMapEligible()) {
      toast('No pinned devices or device tiles available yet');
      return;
    }
  }
  flockMapVisible = typeof forceOpen === 'boolean' ? forceOpen : !flockMapVisible;
  if (flockMapVisible) {
    void refreshDeviceMapTileStatus();
  }
  renderFlockMapPanel();
}

// ── WebSocket ──
function wsConnect() {
  if (wsConnectInFlight) return;
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  if (wsReconnectTimer) {
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = null;
  }
  wsConnectInFlight = true;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    wsConnectInFlight = false;
    $('#wsDot').className = 'dot on';
    wsRetryMs = 1500;
    ws.send('hi');
    startGpsWatcher();
    syncGpsClientStatus(true);
  };
  ws.onclose = () => {
    wsConnectInFlight = false;
    $('#wsDot').className = 'dot off';
    if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
    const reconnectDelay = document.hidden ? Math.max(wsRetryMs, 10000) : wsRetryMs;
    wsReconnectTimer = setTimeout(() => {
      wsReconnectTimer = null;
      wsConnect();
    }, reconnectDelay);
    wsRetryMs = Math.min(Math.floor(wsRetryMs * 1.6), 30000);
  };
  ws.onerror = () => {
    wsConnectInFlight = false;
    try { ws.close(); } catch(ex) {}
  };
  ws.onmessage = e => {
    try { applyIncomingState(JSON.parse(e.data)); } catch(ex) {}
  };
}

// ── API helpers ──
async function api(path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 8000);
  const opts = body
    ? {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body), signal:controller.signal}
    : {signal:controller.signal};
  try {
    const r = await fetch(path, opts);
    const text = await r.text();
    if (!text) return null;
    return JSON.parse(text);
  } catch(e) { return null; }
  finally { clearTimeout(timer); }
}

async function apiPostOk(path, body) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 5000);
  try {
    const r = await fetch(path, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body || {}),
      signal:controller.signal
    });
    return !!r.ok;
  } catch(e) {
    return false;
  } finally {
    clearTimeout(timer);
  }
}

async function fetchDevices() { devices = await api('/api/devices') || []; }
async function fetchDrones()  { drones  = await api('/api/drones') || []; }
async function fetchLogs()    { logsData = await api('/api/logs') || null; return logsData; }

function apInfoForMode(mode) {
  if (state.singleApName) return {ssid:'UniSpy-C6', pass:'ouispy123'};
  return WIFI_CFG[Number(mode)] || WIFI_CFG[0];
}

async function setMode(m) {
  m = Number(m);
  if (modeSwitchInFlight) return;
  if (Number(state.mode) === m && currentView === m) return;
  const modeName = ['Mode Select','Flock You','Fox Hunter','Sky Spy','Settings'][m] || 'Mode';
  modeSwitchInFlight = true;
  setMainSwitching(true);
  let r = await api('/api/mode', {mode: m});
  if (!r) {
    /* AP/webserver can briefly restart around mode transitions; retry once. */
    await new Promise(resolve => setTimeout(resolve, 350));
    r = await api('/api/mode', {mode: m});
  }
  if (r) {
    state.mode = m;
    scheduleUIUpdate(true);
    toast(modeName + ' requested');
  } else {
    setMainSwitching(false);
    toast('Mode request failed - retry');
  }
  modeSwitchInFlight = false;
}

function goMainMenu() {
  setMode(0);
}

function toast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

const WIFI_CFG = [
  {ssid:'ouispy-c6',   pass:'ouispy123'},
  {ssid:'flockyou-c6', pass:'flockyou123'},
  {ssid:'foxhunt-c6',  pass:'foxhunt123'},

];
function loggingChipClass() {
  if (state.loggingActive) return 'log-chip';
  if (state.loggingBlocked) return 'log-chip wait';
  return 'log-chip off';
}

function loggingStatusText() {
  return state.loggingStatus || (state.loggingActive ? 'Active' : (state.loggingBlocked ? 'Waiting for microSD' : 'Off'));
}

function formatStorageAmount(kb, includeTenths) {
  const value = Number(kb || 0);
  if (!Number.isFinite(value) || value <= 0) return '0 KB';
  if (value >= 1024) {
    const mb = value / 1024;
    return includeTenths ? `${mb.toFixed(1)} MB` : `${Math.round(mb)} MB`;
  }
  return `${Math.round(value)} KB`;
}

function formatStorageUsageCompact(usedKb, totalKb) {
  const total = Number(totalKb || 0);
  const used = Number(usedKb || 0);
  if (!Number.isFinite(total) || total <= 0) return 'No card capacity data yet';
  return `${formatStorageAmount(used, true)} used of ${formatStorageAmount(total, false)}`;
}

function loggingSummaryText() {
  const mode = state.loggingStatus || 'RAM only';
  const diag = state.advancedLoggingEnabled ? 'Advanced diagnostics on.' : 'Advanced diagnostics off.';
  const serial = state.advancedSerialLoggingEnabled ? 'Map serial trace on.' : 'Map serial trace off.';
  const storage = state.microsdAvailable ? formatStorageUsageCompact(state.microsdUsedKb, state.microsdTotalKb) + '.' : '';
  return mode + '. ' + storage + ' ' + diag + ' ' + serial;
}

function updateHeaderLoggingStatus() {
  const el = $('#logStatusHdr');
  if (!el) return;
  el.className = 'status-pill ' + (state.loggingActive ? 'active' : (state.loggingBlocked ? 'wait' : 'off'));
  el.textContent = state.loggingActive ? 'LOG ON' : (state.loggingBlocked ? 'LOG WAIT' : 'LOG OFF');
}

function logBootStamp(ts) {
  return 'T+' + fmtTime(Math.max(0, Number(ts) || 0));
}

function logAgeLabel(ts) {
  const now = Number(state.uptime || 0);
  const age = Math.max(0, now - Number(ts || 0));
  return age < 2 ? 'just now' : fmtTime(age) + ' ago';
}

// ── RSSI helpers ──
function rssiClass(r) { return r > -55 ? 'strong' : r > -75 ? 'medium' : 'weak'; }
function rssiColor(r) {
  const t = Math.min(1, Math.max(0, (r + 100) / 80));
  /* rose → amber → green gradient */
  const red = Math.round(251 - t * 177);
  const grn = Math.round(113 + t * 109);
  const blu = Math.round(113 * (1 - t) + 128 * t);
  return `rgb(${red},${grn},${blu})`;
}
function rssiPct(r) { return Math.min(100, Math.max(0, (r + 100) * 100 / 80)); }
function fmtTime(s) { const m = Math.floor(s/60), h = Math.floor(m/60); return h > 0 ? h+'h '+m%60+'m' : m+'m '+s%60+'s'; }

// ── Tab highlighting + mode theming ──
function updateTabs() {
  const mode = Number(state.mode);
  $$('.tab').forEach(t => t.classList.toggle('active', parseInt(t.dataset.mode) === mode));
  const modeClasses = ['mode-select', 'mode-flock', 'mode-fox', 'mode-sky', 'mode-settings'];
  const cls = modeClasses[mode] || 'mode-settings';

  const themes = {
    1: ['var(--flock)', '248,113,113'],
    2: ['var(--fox)', '251,146,60'],
    3: ['var(--skyblue)', '20,255,0'],
    4: ['var(--accent)', '251,191,36'],
    0: ['var(--accent)', '251,191,36']
  };
  const t = themes[mode] || themes[0];
  document.documentElement.style.setProperty('--mode-accent', t[0]);
  document.documentElement.style.setProperty('--mode-accent-rgb', t[1]);

  ['#main', '.hdr'].forEach(sel => {
    const el = $(sel);
    if(el) { modeClasses.forEach(c => el.classList.remove(c)); el.classList.add(cls); }
  });
}

// ── Main render loop ──
function updateUI() {
  $('#heapInfo').textContent = Math.round((state.heap||0)/1024) + 'kB';
  $('#uptimeInfo').textContent = fmtTime(state.uptime || 0);
  updateHeaderLoggingStatus();
  updateTabs();

  const m = Number(state.mode);
  if (m !== 3) stopSkyRadarAnimation();
  const main = $('#main');
  const domView = main ? Number(main.dataset.view || -1) : -1;
  const forceViewRender = (m !== currentView) || (domView !== m);

  if (forceViewRender) {
    const seq = ++modeRenderSeq;
    currentView = m;
    renderModeLoading(m);

    if (m === 1) {
      fetchDevices().then(() => {
        if (seq !== modeRenderSeq || Number(state.mode) !== 1) return;
        renderFlock();
        const cur = $('#main');
        if (cur) cur.dataset.view = '1';
      });
    } else if (m === 2) {
      renderFox();
      const cur = $('#main');
      if (cur) cur.dataset.view = '2';
    } else if (m === 3) {
      fetchDrones().then(() => {
        if (seq !== modeRenderSeq || Number(state.mode) !== 3) return;
        renderSky();
        const cur = $('#main');
        if (cur) cur.dataset.view = '3';
      });
    } else if (m === 4) {
      renderSettings();
      const cur = $('#main');
      if (cur) cur.dataset.view = '4';
    } else {
      renderModeSelectInfo();
      const cur = $('#main');
      if (cur) cur.dataset.view = '0';
    }
  } else {
    // Live update within current view
    if (m === 0) updateMainMenuLive();
    else if (m === 1) updateFlockLive();
    else if (m === 2) updateFoxLive();
    else if (m === 3) updateSkyLive();
    else if (m === 4) updateSettingsLive();
  }
  // Always refresh WiFi bar (clients count is dynamic)
  $('#wifiBar').innerHTML = wifiInfoHtml();
}

let foxRegistry = [], foxNearby = [];
let foxLiveCounter = 0;
async function fetchFoxRegistry() { foxRegistry = await api('/api/fox/registry') || []; }
async function fetchFoxNearby()   { foxNearby   = await api('/api/fox/nearby')   || []; }

function setFoxSelected(mac) {
  foxSelectedMac = String(mac || '').toUpperCase();
  renderFoxInner();
}

function setFoxViewFilter(filter) {
  foxViewFilter = filter;
  renderFoxInner();
}

function setFoxSearchQuery(value) {
  foxSearchQuery = String(value || '');
  renderFoxInner();
}

function foxRegistryEntryForMac(mac) {
  const target = String(mac || '').toUpperCase();
  return (foxRegistry || []).find(entry => String(entry.mac || '').toUpperCase() === target) || null;
}

function foxEncounterLabel(device) {
  const age = foxSeenAgeSec(device);
  const seen = foxSeenDurationSec(device);
  const rssi = Number(device.rssi || -100);
  const best = Number(device.bestRssi || rssi);
  const hits = Number(device.hits || 0);
  if (age <= 8 && rssi >= -80) return 'nearby';
  if (age <= 12 && seen >= 20 && hits >= 4 && (rssi >= -82 || best >= -78)) return 'following';
  return 'detected';
}

function foxItemSection(item) {
  if (!item) return 'auto';
  if (item.registry && item.registry.section) return normRegSection(item.registry.section);
  if (item.hasDrone) return 'drone';
  if (item.hasFlock) return 'flock';
  if (item.hasWifi) return 'wifi';
  return 'ble';
}

function foxItemTrackMode(item) {
  return foxItemSection(item) === 'drone' ? 'drone' : 'flock';
}

function foxItemTrackKind(item) {
  const section = foxItemSection(item);
  if (section === 'drone') return 'drone';
  if (section === 'flock') return 'flock';
  return 'fox';
}

function foxDisplayName(item) {
  if (!item) return 'Device';
  if (item.registry) return regDisplayName(item.registry);
  return item.name || item.mac || 'Device';
}

function foxBuildConsoleItems() {
  const items = new Map();
  const ensure = mac => {
    const key = String(mac || '').toUpperCase();
    if (!items.has(key)) {
      items.set(key, {
        mac: key,
        name: key,
        sourceType: 'ble',
        sourceLabel: 'BLE',
        rssi: -128,
        bestRssi: -128,
        hits: 0,
        ageSec: Number.MAX_SAFE_INTEGER,
        seenSec: 0,
        saved: false,
        online: false,
        pinned: !!getStoredLocation(key),
        hasWifi: false,
        hasFlock: false,
        hasDrone: false,
        hasFoxBle: false,
        encounter: 'detected',
        registryIndex: -1,
        registry: null,
        currentTarget: false
      });
    }
    return items.get(key);
  };

  (foxRegistry || []).forEach((entry, index) => {
    const item = ensure(entry.mac);
    item.saved = true;
    item.registryIndex = index;
    item.registry = entry;
    item.name = foxDisplayName({ registry: entry, mac: entry.mac });
    item.sourceType = 'saved';
    item.sourceLabel = 'Saved profile';
    item.online = !!entry.online || item.online;
    if (Number.isFinite(Number(entry.lastSeenAgeSec)) && Number(entry.lastSeenAgeSec) >= 0) item.ageSec = Math.min(item.ageSec, Number(entry.lastSeenAgeSec));
    if (Number.isFinite(Number(entry.liveRssi)) && Number(entry.liveRssi) > -127) item.rssi = Number(entry.liveRssi);
    if (Number(entry.liveHits || 0) > item.hits) item.hits = Number(entry.liveHits || 0);
  });

  (foxNearby || []).forEach(device => {
    const item = ensure(device.mac);
    item.hasFoxBle = true;
    item.online = true;
    item.sourceType = item.saved ? item.sourceType : 'ble';
    item.sourceLabel = 'Fox BLE';
    item.name = device.name || item.name;
    item.rssi = Number(device.rssi || item.rssi);
    item.bestRssi = Math.max(Number(device.bestRssi || device.rssi || -128), item.bestRssi);
    item.hits = Math.max(Number(device.hits || 0), item.hits);
    item.ageSec = Math.min(item.ageSec, foxSeenAgeSec(device));
    item.seenSec = Math.max(item.seenSec, foxSeenDurationSec(device));
    item.encounter = foxEncounterLabel(device);
  });

  (state.wifiClientMacs || []).forEach(mac => {
    const item = ensure(mac);
    item.hasWifi = true;
    item.online = true;
    item.sourceType = item.saved ? item.sourceType : 'wifi';
    item.sourceLabel = 'WiFi client';
    item.name = item.name === item.mac ? 'WiFi Client' : item.name;
    item.ageSec = 0;
    item.bestRssi = Math.max(item.bestRssi, -85);
    item.rssi = item.rssi > -127 ? item.rssi : -85;
  });

  devices.filter(device => device.flock).forEach(device => {
    const item = ensure(device.mac);
    item.hasFlock = true;
    item.online = true;
    item.sourceType = item.saved ? item.sourceType : 'flock';
    item.sourceLabel = device.raven ? 'Raven sensor' : 'Flock device';
    item.name = device.name || item.name;
    item.rssi = Number(device.rssi || item.rssi);
    item.bestRssi = Math.max(Number(device.bestRssi || device.rssi || -128), item.bestRssi);
    item.hits = Math.max(Number(device.hits || 0), item.hits);
    item.ageSec = Math.min(item.ageSec, Math.max(0, (state.uptime || 0) - Number(device.lastSeen || state.uptime || 0)));
  });

  (drones || []).forEach(drone => {
    const item = ensure(drone.mac);
    item.hasDrone = true;
    item.online = true;
    item.sourceType = item.saved ? item.sourceType : 'drone';
    item.sourceLabel = drone.proto ? `${drone.proto} drone` : 'Drone';
    item.name = drone.id || item.name;
    item.rssi = Number(drone.rssi || item.rssi);
    item.bestRssi = Math.max(item.bestRssi, Number(drone.rssi || -128));
    item.ageSec = Math.min(item.ageSec, Math.max(0, (state.uptime || 0) - Number(drone.lastSeen || state.uptime || 0)));
  });

  const foxState = state.fox || {};
  return Array.from(items.values()).map(item => {
    const localPin = getStoredLocation(item.mac);
    const regPin = (!localPin && item.registry && Number.isFinite(item.registry.pinnedLat) && item.registry.pinnedLat !== 0)
      ? { lat: item.registry.pinnedLat, lon: item.registry.pinnedLon, radiusM: item.registry.pinnedRadiusM || 30, source: 'registry', ts: Date.now() }
      : null;
    const pinned = localPin || regPin;
    const currentTarget = String(foxState.target || '').toUpperCase() === item.mac;
    return Object.assign(item, {
      pinned: !!pinned,
      pinnedLocation: pinned,
      currentTarget,
      gpsLat: currentTarget ? Number(foxState.estLat || 0) : 0,
      gpsLon: currentTarget ? Number(foxState.estLon || 0) : 0,
      gpsRadiusM: currentTarget ? Number(foxState.estRadiusM || 0) : 0,
      gpsSamples: currentTarget ? Number(foxState.gpsSamples || 0) : 0,
      ageSec: Number.isFinite(item.ageSec) && item.ageSec < Number.MAX_SAFE_INTEGER ? item.ageSec : -1
    });
  });
}

function foxFilterCounts(items) {
  return {
    priority: items.filter(item => item.currentTarget || item.saved || item.pinned || item.encounter === 'nearby' || item.encounter === 'following').length,
    saved: items.filter(item => item.saved).length,
    live: items.filter(item => item.online || item.hasWifi || item.hasFlock || item.hasDrone || item.hasFoxBle).length,
    nearby: items.filter(item => item.encounter === 'nearby').length,
    following: items.filter(item => item.encounter === 'following').length,
    pinned: items.filter(item => item.pinned).length
  };
}

function foxItemMatchesFilter(item) {
  switch (foxViewFilter) {
    case 'saved': return item.saved;
    case 'live': return item.online || item.hasWifi || item.hasFlock || item.hasDrone || item.hasFoxBle;
    case 'nearby': return item.encounter === 'nearby';
    case 'following': return item.encounter === 'following';
    case 'wifi': return item.hasWifi;
    case 'flock': return item.hasFlock;
    case 'drone': return item.hasDrone;
    case 'ble': return item.hasFoxBle;
    case 'all': return true;
    case 'priority':
    default:
      return item.currentTarget || item.saved || item.pinned || item.encounter === 'nearby' || item.encounter === 'following';
  }
}

function foxItemMatchesSearch(item) {
  const needle = foxSearchQuery.trim().toLowerCase();
  if (!needle) return true;
  const haystack = [
    item.mac,
    item.name,
    item.sourceLabel,
    item.registry && item.registry.label,
    item.registry && item.registry.nickname,
    item.registry && item.registry.notes,
    item.registry && item.registry.originalName
  ].filter(Boolean).join(' ').toLowerCase();
  return haystack.includes(needle);
}

function foxFilteredConsoleItems(allItems) {
  return allItems
    .filter(item => foxItemMatchesFilter(item) && foxItemMatchesSearch(item))
    .sort((a, b) => {
      if (a.currentTarget !== b.currentTarget) return a.currentTarget ? -1 : 1;
      if (a.saved !== b.saved) return a.saved ? -1 : 1;
      const aAge = Number.isFinite(Number(a.ageSec)) ? Number(a.ageSec) : Number.MAX_SAFE_INTEGER;
      const bAge = Number.isFinite(Number(b.ageSec)) ? Number(b.ageSec) : Number.MAX_SAFE_INTEGER;
      if (aAge !== bAge) return aAge - bAge;
      if (a.rssi !== b.rssi) return b.rssi - a.rssi;
      return foxDisplayName(a).localeCompare(foxDisplayName(b));
    });
}

function foxResolveSelectedItem(filteredItems, allItems) {
  const current = filteredItems.find(item => item.mac === foxSelectedMac)
    || allItems.find(item => item.mac === foxSelectedMac)
    || filteredItems[0]
    || allItems[0]
    || null;
  foxSelectedMac = current ? current.mac : '';
  return current;
}

function htmlEsc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function agoStr(sec) {
  if(!sec || sec < 0) return '?';
  const d = (state.uptime||0) - sec;
  if(d <= 0) return 'just now';
  const m = Math.floor(d/60), h = Math.floor(m/60);
  return h > 0 ? h+'h '+m%60+'m ago' : m > 0 ? m+'m '+d%60+'s ago' : d+'s ago';
}

const REG_SECTIONS = ['auto','wifi','flock','drone','ble','known'];
function normRegSection(s) {
  const v = String(s || 'auto').toLowerCase();
  return REG_SECTIONS.includes(v) ? v : 'auto';
}
function sectionPretty(s) {
  const key = normRegSection(s);
  if(key === 'wifi') return 'WiFi Clients';
  if(key === 'flock') return 'Flock Cameras';
  if(key === 'drone') return 'Sky Spy Drones';
  if(key === 'ble') return 'Nearby BLE';
  if(key === 'known') return 'Known Devices';
  return 'Auto';
}
function regDisplayName(r) {
  return r.nickname || r.label || r.originalName || r.mac;
}
function regSectionOptions(selected) {
  const cur = normRegSection(selected);
  return REG_SECTIONS.map(s => `<option value="${s}" ${cur===s?'selected':''}>${sectionPretty(s)}</option>`).join('');
}
function foxRegistryCapacity() {
  return Number(state.foxRegistryCapacity || (state.microsdAvailable ? 32 : 8));
}
function shortAgeLabel(sec) {
  const n = Number(sec);
  if (!Number.isFinite(n) || n < 0) return 'not seen this session';
  if (n === 0) return 'live now';
  if (n < 60) return `${n}s ago`;
  const min = Math.floor(n / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  return `${hr}h ${min % 60}m ago`;
}
function foxRegistrySortEntries(items) {
  const sorted = (items || []).slice();
  sorted.sort((a, b) => {
    if (foxRegistrySortMode === 'name') {
      return regDisplayName(a).localeCompare(regDisplayName(b)) || a.mac.localeCompare(b.mac);
    }
    if (foxRegistrySortMode === 'section') {
      return sectionPretty(a.section).localeCompare(sectionPretty(b.section)) || regDisplayName(a).localeCompare(regDisplayName(b));
    }
    const aSeen = Number.isFinite(Number(a.lastSeenAgeSec)) ? Number(a.lastSeenAgeSec) : Number.MAX_SAFE_INTEGER;
    const bSeen = Number.isFinite(Number(b.lastSeenAgeSec)) ? Number(b.lastSeenAgeSec) : Number.MAX_SAFE_INTEGER;
    if (aSeen !== bSeen) return aSeen - bSeen;
    return regDisplayName(a).localeCompare(regDisplayName(b));
  });
  return sorted;
}

async function saveRegistryFromSource(mac, label, originalName, section, encoded) {

  const safeOriginal = encoded ? decodeURIComponent(originalName || '') : (originalName || '');
