function foxSeenAgeSec(d) {
  const now = state.uptime || 0;
  const last = d.lastSeen || now;
  const age = now - last;
  return age > 0 ? age : 0;
}

function foxSeenDurationSec(d) {
  const first = d.firstSeen || 0;
  const last = d.lastSeen || first;
  const dur = last - first;
  return dur > 0 ? dur : 0;
}

function foxGroupNearbyDevices(list) {
  const nearby = [];
  const following = [];
  const detected = [];

  (list || []).forEach(d => {
    const age = foxSeenAgeSec(d);
    const seen = foxSeenDurationSec(d);
    const rssi = Number(d.rssi || -100);
    const best = Number(d.bestRssi || rssi);
    const hits = Number(d.hits || 0);

    const isNearby = age <= 8 && rssi >= -80;
    const isFollowing = !isNearby && age <= 12 && seen >= 20 && hits >= 4 && (rssi >= -82 || best >= -78);

    if (isNearby) nearby.push(d);
    else if (isFollowing) following.push(d);
    else detected.push(d);
  });

  nearby.sort((a,b) => (b.rssi - a.rssi) || (b.bestRssi - a.bestRssi) || ((b.hits||0) - (a.hits||0)));
  following.sort((a,b) => (foxSeenDurationSec(b) - foxSeenDurationSec(a)) || (b.rssi - a.rssi) || ((b.hits||0) - (a.hits||0)));
  detected.sort((a,b) => (foxSeenAgeSec(a) - foxSeenAgeSec(b)) || (b.rssi - a.rssi) || ((b.hits||0) - (a.hits||0)));

  return { nearby, following, detected };
}

async function lockFox(mac, options) {
  api('/api/fox/target', {mac});
  const rssi = options && Number.isFinite(Number(options.rssi)) ? Number(options.rssi) : -85;
  const mode = options && options.mode === 'drone' ? 'drone' : 'flock';
  const kind = options && options.kind ? options.kind : 'fox';
  if (gpsToggleEnabled && gpsSecureAvailable()) {
    try {
      const pos = await getCurrentPosition();
      await api('/api/target/gps', { type: 'fox', mac, lat: pos.coords.latitude, lon: pos.coords.longitude, rssi });
      saveCameraLocation(mac, pos.coords.latitude, pos.coords.longitude, 'gps', rssi, mode, kind);
      syncPinToRegistry(mac);
      if (Number(state.mode) === 2) renderFoxInner();
    } catch (e) {}
  }
  toast('Locked on ' + mac);
}

async function clearFoxTarget() {
  const r = await api('/api/fox/target', { clear: true });
  if (r && r.ok) {
    state.fox = Object.assign({}, state.fox || {}, {
      hasTarget: false,
      target: 'none',
      found: false,
      rssi: -100,
      bestRssi: -100,
      lastSeenSec: 0
    });
    renderFoxInner();
    toast('Target cleared');
  } else {
    toast('Failed to clear target');
  }
}

function renderFoxBars(rssi) {
  const el = $('#foxBars'); if(!el) return;
  const pct = rssiPct(rssi);
  let html = '';
  for(let i = 0; i < 20; i++) {
    const active = (i / 20 * 100) < pct;
    const h = 10 + i * 1.5;
    html += `<div class="bar" style="height:${h}px;background:${active ? rssiColor(rssi) : '#27272a'}"></div>`;
  }
  el.innerHTML = html;
}

function updateFoxLive() {
  const f = state.fox || {};
  const hasTargetDom = !!$('#foxRssi');
  const hasTargetState = !!f.hasTarget;
  const domMacEl = $('#foxMac');
  const domMac = domMacEl ? (domMacEl.textContent || '').trim() : '';
  const stateMac = (f.target || '').trim();
  if (hasTargetDom !== hasTargetState || (hasTargetState && stateMac && domMac !== stateMac)) {
    renderFoxInner();
    return;
  }

  updateFoxLedButton(!!f.ledMode, foxLedToggleInFlight);
  const el = $('#foxRssi'); if(el) { el.textContent = f.found ? f.rssi : '--'; el.style.color = rssiColor(f.rssi); }
  const best = $('#foxBest'); if(best) best.textContent = 'Best: ' + f.bestRssi + ' dBm';
  const seen = $('#foxLastSeen');
  if(seen) seen.textContent = 'Last seen: ' + (f.found ? 'just now' : ((f.lastSeenSec||0) > 0 ? (f.lastSeenSec + 's ago') : 'unknown'));
  const prox = $('#foxProximity');
  if(prox) prox.textContent = 'Est. proximity: ' + (f.proximity || 'very far');
  const bar = $('#foxBar'); if(bar) { bar.style.width = rssiPct(f.rssi) + '%'; bar.style.background = rssiColor(f.rssi); }
  const pct = $('#foxPct'); if(pct) pct.textContent = Math.round(rssiPct(f.rssi)) + '%';
  renderFoxBars(f.rssi || -100);
  if (++foxLiveCounter % 20 === 0) {
    Promise.all([fetchFoxRegistry(), fetchDevices(), fetchDrones(), fetchFoxNearby()]).then(() => {
      if (Number(state.mode) === 2) renderFoxInner();
    });
  }
}

function updateFoxLedButton(ledMode, pending) {
  const btn = $('#foxLedBtn');
  if (btn) {
    btn.style.borderColor = ledMode ? 'var(--skyblue)' : 'var(--green)';
    btn.style.color = ledMode ? 'var(--skyblue)' : 'var(--green)';
    btn.style.background = ledMode ? 'rgba(56,189,248,.08)' : 'rgba(74,222,128,.08)';
    btn.innerHTML = ledMode ? '&#9889; STING' : '&#9673; DETECTOR';
    btn.disabled = !!pending;
  }
  const hint = $('#foxLedHint');
  if (hint) {
    const base = ledMode
      ? 'Blue LED brightness scales with signal strength'
      : 'Green standby &rarr; blinking red on detection (faster = closer)';
    hint.innerHTML = pending ? (base + ' &middot; updating...') : base;
  }
}

async function toggleFoxLed() {
  if (foxLedToggleInFlight) return;
  const current = !!((state.fox || {}).ledMode);
  const next = !current;

  foxLedToggleInFlight = true;
  foxLedOptimistic = next;
  state.fox = Object.assign({}, state.fox || {}, { ledMode: next });
  updateFoxLedButton(next, true);

  let ok = await apiPostOk('/api/fox/ledmode', { mode: next ? 1 : 0 });
  if (!ok) {
    await new Promise(resolve => setTimeout(resolve, 220));
    ok = await apiPostOk('/api/fox/ledmode', { mode: next ? 1 : 0 });
  }

  if (!ok) {
    foxLedOptimistic = null;
    state.fox = Object.assign({}, state.fox || {}, { ledMode: current });
    updateFoxLedButton(current, false);
    toast('Detector mode toggle failed');
    foxLedToggleInFlight = false;
    return;
  }

  updateFoxLedButton(next, false);
  setTimeout(() => {
    if (foxLedOptimistic === next) foxLedOptimistic = null;
  }, 1600);
  foxLedToggleInFlight = false;
}

function setFoxTarget() {
  const mac = ($('#macInput') || {}).value;
  if(!(mac && mac.length >= 17)) { toast('Enter a valid MAC address'); return; }
  lockFox(mac, { rssi: -85, mode: 'flock', kind: 'fox' });
}

async function saveRegistryMeta(idx) {
  const nickEl = $('#regNick_' + idx);
  const notesEl = $('#regNotes_' + idx);
  const sectionEl = $('#regSection_' + idx);
  const body = {
    index: idx,
    nickname: nickEl ? nickEl.value.trim() : '',
    notes: notesEl ? notesEl.value.trim() : '',
    section: sectionEl ? normRegSection(sectionEl.value) : 'auto'
  };
  const r = await api('/api/fox/registry/update', body);
  if(r && r.ok) {
    toast('Registry details saved');
    await fetchFoxRegistry();
    renderFoxInner();
  } else {
    toast('Failed to save details');
  }
}

async function addMacToRegistry() {
  const mac = ($('#macInput') || {}).value;
  const label = ($('#regLabelInput') || {}).value || '';
  if(!mac || mac.length < 17) { toast('Enter a valid MAC'); return; }
  const r = await api('/api/fox/registry', {mac, label, originalName: label || mac, section: 'known'});
  if(r && r.ok) { toast('Saved to registry'); foxSelectedMac = String(mac || '').toUpperCase(); fetchFoxRegistry().then(() => renderFoxInner()); }
  else toast(`Registry full (${foxRegistryCapacity()}) or error`);
}

async function saveTargetToRegistry() {
  const f = state.fox || {};
  if(!f.hasTarget) return;
  const label = prompt('Label for '+f.target+':', '') || '';
  const r = await api('/api/fox/registry', {mac: f.target, label, originalName: label || f.target, section: 'known'});
  if(r && r.ok) { toast('Saved to registry'); foxSelectedMac = String(f.target || '').toUpperCase(); fetchFoxRegistry().then(() => renderFoxInner()); }
  else toast(`Registry full (${foxRegistryCapacity()}) or already saved`);
}

async function removeFromRegistry(idx) {
  try {
    const removed = foxRegistry[idx];
    await fetch('/api/fox/registry', {method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({index:idx})});
    if (removed && state.fox && state.fox.hasTarget && removed.mac === state.fox.target) {
      await clearFoxTarget();
    }
    toast('Removed');
    fetchFoxRegistry().then(() => renderFoxInner());
  } catch(e) { toast('Error removing'); }
}

function stopSkyRadarAnimation() {
  if (skyRadarAnimId) {
    cancelAnimationFrame(skyRadarAnimId);
    skyRadarAnimId = 0;
  }
}

function startSkyRadarAnimation() {
  const canvas = $('#skyRadarCanvas');
  if (!canvas) {
    stopSkyRadarAnimation();
    return;
  }

  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  stopSkyRadarAnimation();
  const size = canvas.width;
  const cx = size / 2;
  const cy = size / 2;
  const radius = (size / 2) - 2;

  const draw = () => {
    if (!$('#skyRadarCanvas')) {
      stopSkyRadarAnimation();
      return;
    }

    skyRadarAngle = (skyRadarAngle + 1.6) % 360;
    const a0 = (skyRadarAngle - 18) * Math.PI / 180;
    const a1 = (skyRadarAngle + 18) * Math.PI / 180;

    ctx.clearRect(0, 0, size, size);

    ctx.fillStyle = 'rgba(56,189,248,0.05)';
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(63,63,70,0.9)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(63,63,70,0.45)';
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 0.66, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 0.33, 0, Math.PI * 2);
    ctx.stroke();

    const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, radius);
    grad.addColorStop(0, 'rgba(56,189,248,0.26)');
    grad.addColorStop(1, 'rgba(56,189,248,0.00)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, a0, a1);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(248,113,113,0.95)';
    ctx.beginPath();
    ctx.arc(cx, cy, 3.2, 0, Math.PI * 2);
    ctx.fill();

    skyRadarAnimId = requestAnimationFrame(draw);
  };

  skyRadarAnimId = requestAnimationFrame(draw);
}

function skyNeedsStructuralRender() {
  const hasDrones = Number(state.droneCount || 0) > 0;
  const hasRadarCanvas = !!$('#skyRadarCanvas');
  const hasRefreshButton = !!$('#main .card button[onclick="fetchDrones().then(()=>renderDroneCards())"]');
  return hasDrones ? hasRadarCanvas || !hasRefreshButton : (!hasRadarCanvas || hasRefreshButton);
}

function renderDroneCards() {
  const el = $('#droneList'); if(!el) return;
  let wifi=0, ble=0;
  let html = '';
  drones.forEach(d => {
    if(d.proto==='wifi') wifi++; else if(d.proto==='ble') ble++;
    html += `<div class="drone-card">
      <div class="drone-hdr">
        <span class="dev-mac">${d.id || d.mac}</span>
        <span class="drone-proto ${d.proto}">${d.proto}</span>
        <span class="dev-rssi ${rssiClass(d.rssi)}">${d.rssi} dBm</span>
      </div>
      <dl class="drone-fields">
        ${d.hasLoc ? `<dt>Position</dt><dd>${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</dd>` : ''}
        ${d.alt ? `<dt>Altitude</dt><dd>${d.alt.toFixed(1)}m</dd>` : ''}
        ${d.speed ? `<dt>Speed</dt><dd>${d.speed.toFixed(1)} m/s</dd>` : ''}
        ${d.hasPilot ? `<dt>Pilot</dt><dd>${d.pilotLat.toFixed(5)}, ${d.pilotLon.toFixed(5)}</dd>` : ''}
        ${d.opId ? `<dt>Operator</dt><dd>${d.opId}</dd>` : ''}
      </dl>
      <div style="margin-top:8px">
        <button class="btn sm" onclick="trackDrone('${d.mac}')">🎯 Track Signal</button>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  const wc = $('#sWifiCount'); if(wc) wc.textContent = wifi;
  const bc = $('#sBleCount'); if(bc) bc.textContent = ble;
}
function updateSkyLive() {
  if (skyNeedsStructuralRender()) {
    if(state.droneCount > 0 && !drones.length) {
      fetchDrones().then(() => renderSky());
      return;
    }
    renderSky();
    return;
  }

  const el = $('#sDroneCount'); if(el) el.textContent = state.droneCount || 0;
  renderSkyGpsWidgets();
  renderFlockMapPanel();
  if (flockMapVisible) drawFlockMap();
  if ((state.droneCount || 0) > 0) stopSkyRadarAnimation();
  else startSkyRadarAnimation();
  if(state.droneCount > 0 && !drones.length) fetchDrones().then(() => renderDroneCards());
}

  if (summary) {
    summary.textContent = loggingSummaryText();
  }

  if (!logsData) {
    host.innerHTML = '<div class="empty"><div class="icon">📝</div>Loading recent logs...</div>';
    return;
  }

  const entries = Array.isArray(logsData[logFilter]) ? logsData[logFilter] : [];
  if (!entries.length) {
    host.innerHTML = '<div class="empty"><div class="icon">&#128450;</div>No log entries available for this filter.</div>';
    return;
  }
  renderLogEntries(host, entries, 'No log entries available for this filter.');
}

function updateSettingsLive() {
  const modeNames = ['Select','Flock You','Fox Hunter','Sky Spy','Settings'];
  const fw = $('#settingsFirmwareVersion'); if (fw) fw.textContent = state.firmwareVersion || 'unknown';
  const heap = $('#settingsHeap'); if (heap) heap.textContent = Math.round((state.heap||0)/1024) + ' kB';
  const uptime = $('#settingsUptime'); if (uptime) uptime.textContent = fmtTime(state.uptime||0);
  const clients = $('#settingsClients'); if (clients) clients.textContent = state.clients||0;
  const mode = $('#settingsMode'); if (mode) mode.textContent = modeNames[state.mode||0] || 'Unknown';
  const devs = $('#settingsDevices'); if (devs) devs.textContent = state.deviceCount||0;
  const dronesEl = $('#settingsDrones'); if (dronesEl) dronesEl.textContent = state.droneCount||0;
  const cap = $('#settingsLogCapacity'); if (cap) cap.textContent = (state.logCapacityKb||768) + ' kB';
  const logStatus = $('#settingsLoggingStatus'); if (logStatus) logStatus.textContent = loggingStatusText();
  const advLog = $('#settingsAdvLogging'); if (advLog) advLog.textContent = state.advancedLoggingEnabled ? 'Enabled' : 'Disabled';
  const advSerialLog = $('#settingsAdvSerialLogging'); if (advSerialLog) advSerialLog.textContent = state.advancedSerialLoggingEnabled ? 'Enabled' : 'Disabled';
  const serialLog = $('#settingsSerialLogging'); if (serialLog) serialLog.textContent = ['Error','Warn','Info','Debug','Verbose'][Number(state.serialLogVerbosity||2)] || 'Info';
  const sd = $('#settingsMicrosd'); if (sd) sd.textContent = state.microsdStatus || (state.microsdAvailable ? 'Available' : 'Not Found');
  const sdUsage = $('#settingsMicrosdUsage'); if (sdUsage) sdUsage.textContent = state.microsdAvailable ? formatStorageUsageCompact(state.microsdUsedKb, state.microsdTotalKb) : 'Unavailable';
  const gps = $('#settingsGpsStatus');
  if (gps) gps.textContent = state.gpsTagActive ? 'Live' : (state.gpsTagging ? 'Waiting for client' : 'Disabled');

  if (settingsSection === 'logging') {
    renderSettingsLogs();
    if ((++logsRefreshCounter % 4) === 0) {
      refreshLogs(false);
    }
  }

  if (settingsSection === 'pins') {
    renderFlockMapPanel();
    if (flockMapVisible) drawFlockMap();
  }
}

// ── Init ──
wsConnect();
startGpsWatcher();
void refreshDeviceMapTileStatus();
scheduleSharedMapSync(true);
setInterval(() => { if(ws && ws.readyState===1) ws.send('ping'); }, 5000);
// Also poll state in case WS is slow
setInterval(async () => {
  if (ws && ws.readyState === 1) return;
  const s = await api('/api/state');
  if(s) applyIncomingState(s);
}, 3500);

setInterval(() => {
  if (gpsToggleEnabled) startGpsWatcher();
  else stopGpsWatcher();
  if (gpsToggleEnabled && gpsWatcherLooksStale()) scheduleGpsWatcherRestart(200);
  syncGpsClientStatus(false);
}, 4000);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  if (gpsToggleEnabled) startGpsWatcher();
  syncGpsClientStatus(true);
});
</script>
</body>
